// ================================================================
//  COWORKING — Chat temps réel
// ================================================================
function ChatTab({ spaceId, user, userData, members }) {
  const [messages,      setMessages]      = React.useState([]);
  const [text,          setText]          = React.useState("");
  const [sending,       setSending]       = React.useState(false);
  const [showPingModal, setShowPingModal] = React.useState(false);
  const [pingSent,      setPingSent]      = React.useState(null);
  const bottomRef = React.useRef(null);
  const path = spaceId ? `spaces/${spaceId}/chat` : null;

  React.useEffect(() => {
    if (!path) return;
    const unsub = db.collection(path)
      .orderBy("createdAt", "asc")
      .onSnapshot(
        snap => setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
        err  => console.error("Chat error:", err)
      );
    return () => unsub();
  }, [path]);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const send = async () => {
    const t = text.trim();
    if (!t || !path) return;
    setSending(true);
    setText("");
    try {
      const today = new Date().toISOString().slice(0, 10);
      await db.collection(path).add({
        text: t,
        authorId:    user.uid,
        authorName:  userData?.name  || user.displayName || "Moi",
        authorEmoji: userData?.emoji || "🦖",
        day:         today,
        createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(e) { console.error(e); setText(t); }
    setSending(false);
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const doPing = async (target) => {
    setShowPingModal(false);
    try {
      await sendPingTo(spaceId, user, userData, target);
      setPingSent(target.name);
      setTimeout(() => setPingSent(null), 3000);
    } catch(e) { console.error(e); }
  };

  // Grouper par jour
  const grouped = messages.reduce((acc, msg) => {
    const day = msg.day || msg.createdAt?.toDate?.()?.toISOString?.()?.slice(0,10) || "?";
    if (!acc[day]) acc[day] = [];
    acc[day].push(msg);
    return acc;
  }, {});

  const formatDay = (d) => {
    const today     = new Date().toISOString().slice(0, 10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (d === today)     return "Aujourd'hui";
    if (d === yesterday) return "Hier";
    try { return new Date(d).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" }); }
    catch { return d; }
  };

  const isMe = (msg) => msg.authorId === user.uid;
  const others = (members || []).filter(m => m.uid !== user.uid);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 130px)", position:"relative" }}>

      {/* Toast ping envoyé */}
      {pingSent && (
        <div style={{ position:"absolute", top:"10px", left:"50%", transform:"translateX(-50%)",
          background:"#22c55e", color:"white", borderRadius:"20px", padding:"8px 18px",
          fontSize:"0.85rem", fontWeight:600, zIndex:300, boxShadow:"0 4px 14px rgba(0,0,0,0.35)",
          whiteSpace:"nowrap", pointerEvents:"none" }}>
          📣 Ping envoyé à {pingSent} !
        </div>
      )}

      {/* Liste des messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"12px 16px" }}>
        {messages.length === 0 && (
          <div style={{ textAlign:"center", padding:"56px 16px" }}>
            <div style={{ fontSize:"2.5rem", marginBottom:"8px" }}>💬</div>
            <p style={{ color:"var(--secondary)", fontSize:"0.9rem", lineHeight:"1.6" }}>
              Pas encore de messages.<br/>Soyez les premiers à écrire !
            </p>
          </div>
        )}

        {Object.entries(grouped).map(([day, msgs]) => (
          <div key={day}>
            {/* Séparateur de jour */}
            <div style={{ display:"flex", alignItems:"center", gap:"8px", margin:"18px 0 12px" }}>
              <div style={{ flex:1, height:"1px", background:"var(--border)" }} />
              <span style={{ fontSize:"0.7rem", color:"var(--secondary)", fontWeight:600, whiteSpace:"nowrap",
                background:"var(--bg)", padding:"0 6px", borderRadius:"6px", border:"1px solid var(--border)" }}>
                {formatDay(day)}
              </span>
              <div style={{ flex:1, height:"1px", background:"var(--border)" }} />
            </div>

            {msgs.map((msg, i) => {
              const me = isMe(msg);
              const showAuthor = !me && (i === 0 || msgs[i-1]?.authorId !== msg.authorId);
              return (
                <div key={msg.id} style={{ display:"flex", flexDirection: me ? "row-reverse" : "row",
                  alignItems:"flex-end", gap:"8px", marginBottom:"5px" }}>
                  {!me && (
                    <div style={{ width:"32px", height:"32px", borderRadius:"50%", background:"var(--input-bg)",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:"1.1rem", flexShrink:0, border:"1px solid var(--border)",
                      opacity: showAuthor ? 1 : 0 }}>
                      {msg.authorEmoji || "🦖"}
                    </div>
                  )}
                  <div style={{ maxWidth:"72%", display:"flex", flexDirection:"column",
                    alignItems: me ? "flex-end" : "flex-start" }}>
                    {showAuthor && !me && (
                      <span style={{ fontSize:"0.7rem", color:"var(--secondary)", marginBottom:"3px", paddingLeft:"4px" }}>
                        {msg.authorName}
                      </span>
                    )}
                    <div style={{
                      background: me ? "var(--accent)" : "var(--card)",
                      border: me ? "none" : "1px solid var(--border)",
                      borderRadius: me ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                      padding:"9px 13px", fontSize:"0.9rem",
                      color: me ? "white" : "var(--text)",
                      wordBreak:"break-word", lineHeight:"1.45",
                    }}>
                      {msg.text}
                    </div>
                    <span style={{ fontSize:"0.65rem", color:"var(--secondary)", marginTop:"2px",
                      paddingLeft:"4px", paddingRight:"4px" }}>
                      {msg.createdAt?.toDate?.()?.toLocaleTimeString("fr-FR",
                        { hour:"2-digit", minute:"2-digit" }) || ""}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        <div ref={bottomRef} />
      </div>

      {/* Zone de saisie */}
      <div style={{ borderTop:"1px solid var(--border)", padding:"10px 16px",
        paddingBottom:"calc(10px + env(safe-area-inset-bottom))", background:"var(--nav-bg)" }}>
        <div style={{ display:"flex", gap:"8px", alignItems:"flex-end" }}>
          {/* Bouton Ping */}
          {others.length > 0 && (
            <button onClick={() => setShowPingModal(true)} title="Ping un membre"
              style={{ width:"40px", height:"40px", borderRadius:"50%", flexShrink:0,
                background:"var(--input-bg)", border:"1px solid var(--input-border)",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:"1.1rem", cursor:"pointer" }}>
              📣
            </button>
          )}
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Écrire un message…"
            rows={1}
            style={{ flex:1, borderRadius:"18px", border:"1px solid var(--input-border)",
              padding:"10px 14px", resize:"none", fontSize:"0.9rem", lineHeight:"1.4",
              maxHeight:"80px", overflow:"auto",
              background:"var(--input-bg)", color:"var(--text)" }}
          />
          <button
            onClick={send}
            disabled={!text.trim() || sending}
            style={{ width:"40px", height:"40px", borderRadius:"50%",
              background: text.trim() ? "var(--accent)" : "var(--input-bg)",
              border:"1px solid var(--input-border)", cursor: text.trim() ? "pointer" : "default",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:"1rem", flexShrink:0, transition:"background 0.2s, border-color 0.2s",
              borderColor: text.trim() ? "transparent" : "var(--input-border)",
              color: text.trim() ? "white" : "var(--secondary)" }}
          >
            {sending ? "…" : "➤"}
          </button>
        </div>
      </div>

      {/* Modal Ping */}
      {showPingModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:250,
          display:"flex", alignItems:"flex-end" }}
          onClick={() => setShowPingModal(false)}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"var(--card)", borderRadius:"24px 24px 0 0",
              borderTop:"1px solid var(--border)", width:"100%", maxHeight:"70vh", overflowY:"auto",
              padding:"20px 20px", paddingBottom:"calc(20px + env(safe-area-inset-bottom))" }}>
            <div style={{ width:"36px", height:"4px", background:"var(--border)",
              borderRadius:"2px", margin:"0 auto 16px" }} />
            <p style={{ fontWeight:700, fontSize:"1.05rem", marginBottom:"4px" }}>📣 Envoyer un ping</p>
            <p style={{ color:"var(--secondary)", fontSize:"0.82rem", marginBottom:"16px", lineHeight:"1.5" }}>
              La personne reçoit une notification pour venir voir le chat !
            </p>
            {others.map(m => (
              <div key={m.uid} style={{ display:"flex", alignItems:"center", gap:"12px",
                padding:"11px 0", borderBottom:"1px solid var(--border)" }}>
                <span style={{ fontSize:"1.7rem" }}>{m.emoji}</span>
                <span style={{ flex:1, fontWeight:500 }}>{m.name}</span>
                <button onClick={() => doPing(m)}
                  style={{ padding:"8px 16px", borderRadius:"20px", fontWeight:600,
                    fontSize:"0.82rem", cursor:"pointer", border:"none",
                    background:"linear-gradient(135deg, var(--grad1), var(--grad2))",
                    color:"white" }}>
                  Ping ! 🔔
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ================================================================
//  FOCUS — graphique 7 jours (SVG pur)
// ================================================================
function HabitsGraph({ history }) {
  const BAR_H = 80, BAR_W = 30, GAP = 8;
  const totalW = 7 * (BAR_W + GAP) - GAP;
  return (
    <svg width="100%" viewBox={`0 0 ${totalW} ${BAR_H + 22}`} style={{ overflow: "visible" }}>
      {history.map((d, i) => {
        const pct   = d.total > 0 ? d.completed / d.total : 0;
        const barH  = Math.max(3, Math.round(pct * BAR_H));
        const x     = i * (BAR_W + GAP);
        const color = pct >= 0.8 ? "#4ade80" : pct >= 0.5 ? "#fb923c" : pct > 0 ? "#f87171" : "var(--border)";
        const isToday = i === 6;
        return (
          <g key={i}>
            <rect x={x} y={0} width={BAR_W} height={BAR_H} rx={6} fill="var(--input-bg)" />
            <rect x={x} y={BAR_H - barH} width={BAR_W} height={barH} rx={6} fill={color} fillOpacity={isToday ? 1 : 0.7} />
            {pct > 0 && (
              <text x={x + BAR_W / 2} y={BAR_H - barH - 5} textAnchor="middle" fill={color} fontSize={8} fontWeight="700">
                {Math.round(pct * 100)}%
              </text>
            )}
            <text x={x + BAR_W / 2} y={BAR_H + 14} textAnchor="middle" fill={isToday ? "var(--accent)" : "var(--secondary)"} fontSize={9} fontWeight={isToday ? "700" : "400"}>
              {d.dayLabel}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ================================================================
//  FOCUS SCREEN — habitudes & tâches du jour
// ================================================================
const FOCUS_QUOTES = [
  "La discipline est le pont entre les objectifs et les accomplissements.",
  "Chaque journée est une nouvelle chance de changer ta vie.",
  "La constance crée la confiance.",
  "Petit à petit, l'oiseau fait son nid.",
  "Ce que tu fais aujourd'hui peut améliorer tous tes demains.",
  "Les habitudes définissent qui tu es.",
  "Un jour à la fois. Tous les jours.",
  "Le succès est la somme de petits efforts répétés.",
  "Prends soin de toi comme si tu étais ta propre priorité.",
  "Chaque habitude tenue est une victoire silencieuse.",
  "La régularité bat toujours le talent.",
  "Commence où tu es. Utilise ce que tu as. Fais ce que tu peux.",
  "Ta routine du matin définit ta journée.",
  "Soit cohérent, pas parfait.",
];

const HABIT_EMOJIS = ["✅","💪","🏃","📚","💧","🧘","😴","🥗","🚴","🎯","✍️","🧹","🌿","🎵","🌅","🛁","🧠","❤️"];

function FocusScreen({ spaceId, user }) {
  const { showConfirm, ConfirmModal } = useConfirm();
  const [habits,       setHabits]       = useState([]);
  const [todayDoc,     setTodayDoc]     = useState(null);
  const [history,      setHistory]      = useState([]);
  const [showAddHabit, setShowAddHabit] = useState(false);
  const [newHabitName, setNewHabitName] = useState("");
  const [newHabitEmoji,setNewHabitEmoji]= useState("✅");
  const [newTaskText,  setNewTaskText]  = useState("");
  const [quote]        = useState(() => FOCUS_QUOTES[Math.floor(Math.random() * FOCUS_QUOTES.length)]);

  const todayStr  = new Date().toISOString().slice(0, 10);
  const dayNames  = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

  // ---- Habits ----
  useEffect(() => {
    if (!spaceId) return;
    const unsub = db.collection(`spaces/${spaceId}/focusHabits`)
      .orderBy("createdAt", "asc")
      .onSnapshot(
        snap => setHabits(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
        err  => console.error("focusHabits:", err)
      );
    return unsub;
  }, [spaceId]);

  // ---- Today's doc ----
  useEffect(() => {
    if (!spaceId) return;
    const docRef = db.collection(`spaces/${spaceId}/focusDays`).doc(todayStr);
    const unsub = docRef.onSnapshot(
      snap => {
        if (snap.exists) {
          setTodayDoc({ id: snap.id, ...snap.data() });
        } else {
          docRef.set({ date: todayStr, habitChecks: {}, tasks: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          setTodayDoc({ date: todayStr, habitChecks: {}, tasks: [] });
        }
      },
      err => console.error("focusDays:", err)
    );
    return unsub;
  }, [spaceId, todayStr]);

  // ---- History (7 days) ----
  useEffect(() => {
    if (!spaceId) return;
    const unsub = db.collection(`spaces/${spaceId}/focusDays`)
      .orderBy("date", "desc").limit(7)
      .onSnapshot(snap => {
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const result = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const ds    = d.toISOString().slice(0, 10);
          const found = docs.find(x => x.date === ds);
          const checks    = found?.habitChecks || {};
          const completed = Object.values(checks).filter(Boolean).length;
          result.push({ date: ds, dayLabel: dayNames[d.getDay()], completed, total: found ? habits.length : 0 });
        }
        setHistory(result);
      }, err => console.error("history:", err));
    return unsub;
  }, [spaceId, habits.length]);

  const habitChecks     = todayDoc?.habitChecks || {};
  const tasks           = todayDoc?.tasks || [];
  const completedHabits = habits.filter(h => !!habitChecks[h.id]).length;
  const totalHabits     = habits.length;
  const pct             = totalHabits > 0 ? Math.round((completedHabits / totalHabits) * 100) : 0;
  const pctColor        = pct >= 80 ? "#4ade80" : pct >= 50 ? "#fb923c" : "#f87171";
  const mood            = pct >= 80 ? "🔥 En feu !" : pct >= 50 ? "💪 Continue !" : totalHabits > 0 ? "⚡ C'est parti !" : "";

  const toggleHabit = async (habitId) => {
    const docRef = db.collection(`spaces/${spaceId}/focusDays`).doc(todayStr);
    const newVal = !habitChecks[habitId];
    await docRef.update({ [`habitChecks.${habitId}`]: newVal });
    const hRef = db.collection(`spaces/${spaceId}/focusHabits`).doc(habitId);
    const habit = habits.find(h => h.id === habitId);
    if (!newVal) {
      // Décoche : annuler le streak du jour si on vient juste de le setter aujourd'hui
      if (habit?.lastCheckedDate === todayStr) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yd = yesterday.toISOString().slice(0, 10);
        const prevStreak = Math.max(0, (habit?.streak || 1) - 1);
        await hRef.update({ streak: prevStreak, lastCheckedDate: prevStreak > 0 ? yd : null });
      }
      return;
    }
    // Coche : calculer le streak
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const yd     = yesterday.toISOString().slice(0, 10);
    const ydSnap = await db.collection(`spaces/${spaceId}/focusDays`).doc(yd).get();
    const prevOk = ydSnap.exists && ydSnap.data().habitChecks?.[habitId];
    const newStreak = (habit?.lastCheckedDate === yd && prevOk) ? (habit?.streak || 0) + 1 : 1;
    await hRef.update({ streak: newStreak, lastCheckedDate: todayStr });
  };

  const addHabit = async () => {
    if (!newHabitName.trim()) return;
    await db.collection(`spaces/${spaceId}/focusHabits`).add({
      name: newHabitName.trim(), emoji: newHabitEmoji,
      streak: 0, lastCheckedDate: null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setNewHabitName(""); setNewHabitEmoji("✅"); setShowAddHabit(false);
  };

  const deleteHabit = async (habitId) => {
    if (!await showConfirm("Supprimer cette habitude ?")) return;
    await db.collection(`spaces/${spaceId}/focusHabits`).doc(habitId).delete();
  };

  const addTask = async () => {
    if (!newTaskText.trim()) return;
    const t = { id: Date.now().toString(), text: newTaskText.trim(), done: false };
    await db.collection(`spaces/${spaceId}/focusDays`).doc(todayStr).update({
      tasks: firebase.firestore.FieldValue.arrayUnion(t)
    });
    setNewTaskText("");
  };

  const toggleTask = async (taskId) => {
    const updated = tasks.map(t => t.id === taskId ? { ...t, done: !t.done } : t);
    await db.collection(`spaces/${spaceId}/focusDays`).doc(todayStr).update({ tasks: updated });
  };

  const deleteTask = async (taskId) => {
    const updated = tasks.filter(t => t.id !== taskId);
    await db.collection(`spaces/${spaceId}/focusDays`).doc(todayStr).update({ tasks: updated });
  };

  return (
    <div className="pb-32 px-4 pt-3 max-w-md mx-auto">
      {/* Citation */}
      <div className="mb-4 px-4 py-3 rounded-2xl text-center text-sm italic"
        style={{ background: "var(--input-bg)", color: "var(--secondary)", border: "1px solid var(--border)" }}>
        "{quote}"
      </div>

      {/* Bandeau résumé */}
      <div className="card p-4 mb-4 flex items-center justify-between">
        <div>
          <p className="text-4xl font-bold leading-none mb-1"
            style={{ color: totalHabits > 0 ? pctColor : "var(--inactive)" }}>
            {totalHabits > 0 ? `${pct}%` : "—"}
          </p>
          <p className="text-sm" style={{ color: "var(--secondary)" }}>
            {completedHabits}/{totalHabits} habitudes
          </p>
        </div>
        <div className="text-right">
          {mood && <p className="text-sm font-semibold mb-1" style={{ color: "var(--accent)" }}>{mood}</p>}
          <p className="text-xs" style={{ color: "var(--inactive)" }}>
            {new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" })}
          </p>
        </div>
      </div>

      {/* Graphique 7 jours */}
      {history.some(d => d.total > 0) && (
        <div className="card p-4 mb-5">
          <p className="text-xs uppercase tracking-wider mb-3 font-semibold" style={{ color: "var(--secondary)" }}>
            7 derniers jours
          </p>
          <HabitsGraph history={history} />
        </div>
      )}

      {/* Habitudes */}
      <div className="flex items-center justify-between mb-3">
        <p className="text-xs uppercase tracking-wider font-semibold" style={{ color: "var(--secondary)" }}>Habitudes</p>
        <button onClick={() => setShowAddHabit(true)}
          className="text-xs px-3 py-1 rounded-full font-semibold"
          style={{ background: "var(--input-bg)", color: "var(--accent)", border: "1px solid var(--border)" }}>
          + Ajouter
        </button>
      </div>

      {habits.length === 0 ? (
        <div className="card p-6 mb-4 text-center" style={{ color: "var(--inactive)" }}>
          <p className="text-3xl mb-2">🌱</p>
          <p className="text-sm">Ajoute ta première habitude</p>
        </div>
      ) : (
        <div className="flex flex-col gap-2 mb-5">
          {habits.map(h => {
            const checked = !!habitChecks[h.id];
            return (
              <div key={h.id} className="card p-3 flex items-center gap-3">
                <button onClick={() => toggleHabit(h.id)}
                  className="w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0 transition-all"
                  style={checked
                    ? { background: "#1a3a2a", color: "#4ade80", border: "2px solid #4ade80" }
                    : { background: "var(--input-bg)", color: "var(--inactive)", border: "2px solid var(--border)" }}>
                  {checked ? "✓" : h.emoji || "○"}
                </button>
                <div className="flex-1 min-w-0">
                  <p className={`font-medium text-sm ${checked ? "line-through" : ""}`}
                    style={{ color: checked ? "var(--inactive)" : "var(--text)" }}>
                    {h.name}
                  </p>
                  {h.streak > 0 && (
                    <p className="text-xs mt-0.5" style={{ color: "var(--accent)" }}>
                      🔥 {h.streak} jour{h.streak > 1 ? "s" : ""}
                    </p>
                  )}
                </div>
                <button onClick={() => deleteHabit(h.id)}
                  className="w-7 h-7 rounded-full flex items-center justify-center text-xs flex-shrink-0"
                  style={{ background: "#2d1520", color: "#f87171" }}>✕</button>
              </div>
            );
          })}
        </div>
      )}

      {/* Tâches du jour */}
      <div className="flex items-center justify-between mb-3">
        <p className="text-xs uppercase tracking-wider font-semibold" style={{ color: "var(--secondary)" }}>Tâches du jour</p>
        {tasks.length > 0 && (
          <p className="text-xs" style={{ color: "var(--inactive)" }}>
            {tasks.filter(t => t.done).length}/{tasks.length} faites
          </p>
        )}
      </div>

      <div className="flex gap-2 mb-3">
        <input
          value={newTaskText}
          onChange={e => setNewTaskText(e.target.value)}
          onKeyDown={e => e.key === "Enter" && addTask()}
          placeholder="Ajouter une tâche…"
          className="flex-1 border rounded-xl p-3 text-sm"
        />
        <button onClick={addTask} disabled={!newTaskText.trim()}
          className="gradient-bg text-white px-4 rounded-xl font-bold text-xl"
          style={{ opacity: newTaskText.trim() ? 1 : 0.5 }}>+</button>
      </div>

      {tasks.length === 0 ? (
        <div className="card p-5 text-center mb-4" style={{ color: "var(--inactive)" }}>
          <p className="text-sm">Rien de prévu pour aujourd'hui</p>
        </div>
      ) : (
        <div className="flex flex-col gap-2 mb-4">
          {tasks.map(t => (
            <div key={t.id} className="card p-3 flex items-center gap-3">
              <button onClick={() => toggleTask(t.id)}
                className="w-7 h-7 rounded-full flex items-center justify-center text-sm flex-shrink-0 transition-all"
                style={t.done ? { background: "#1a3a2a", color: "#4ade80" } : { background: "var(--input-bg)", color: "var(--inactive)" }}>
                {t.done ? "✓" : "○"}
              </button>
              <p className={`flex-1 text-sm ${t.done ? "line-through" : ""}`}
                style={{ color: t.done ? "var(--inactive)" : "var(--text)" }}>
                {t.text}
              </p>
              <button onClick={() => deleteTask(t.id)}
                className="w-7 h-7 rounded-full flex items-center justify-center text-xs flex-shrink-0"
                style={{ background: "#2d1520", color: "#f87171" }}>✕</button>
            </div>
          ))}
        </div>
      )}

      {/* Modal ajout habitude */}
      {showAddHabit && (
        <div className="modal-overlay" onClick={() => setShowAddHabit(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-bold text-lg">Nouvelle habitude 🌱</h3>
              <button onClick={() => setShowAddHabit(false)} className="text-2xl" style={{ color: "var(--inactive)" }}>×</button>
            </div>
            <label className="block text-sm mb-1" style={{ color: "var(--secondary)" }}>Nom</label>
            <input value={newHabitName} onChange={e => setNewHabitName(e.target.value)}
              placeholder="Ex: Boire 2L d'eau"
              className="w-full border rounded-xl p-3 text-sm mb-4" autoFocus
              onKeyDown={e => e.key === "Enter" && addHabit()} />
            <label className="block text-sm mb-2" style={{ color: "var(--secondary)" }}>Icône</label>
            <div className="flex flex-wrap gap-2 mb-5">
              {HABIT_EMOJIS.map(em => (
                <button key={em} type="button" onClick={() => setNewHabitEmoji(em)}
                  className="w-10 h-10 rounded-full text-xl flex items-center justify-center transition-all"
                  style={{ background: "var(--input-bg)", outline: newHabitEmoji === em ? "2px solid var(--accent)" : "none", transform: newHabitEmoji === em ? "scale(1.15)" : "scale(1)" }}>
                  {em}
                </button>
              ))}
            </div>
            <button onClick={addHabit} disabled={!newHabitName.trim()}
              className="w-full gradient-bg text-white font-bold py-3 rounded-xl"
              style={{ opacity: newHabitName.trim() ? 1 : 0.5 }}>
              Ajouter
            </button>
          </div>
        </div>
      )}

      {ConfirmModal}
    </div>
  );
}

// ================================================================
//  ESPACE — vue principale

function SpaceScreen({ user, userData, space, onBack, currentThemeId, onThemeChange }) {
  const spaceMode = space?.mode || "social";

  // Détermine les modules actifs pour un espace
  const getSpaceModules = (sp) => {
    if (spaceMode === "focus")     return FOCUS_MODULES;
    if (spaceMode === "coworking") return COWORK_TABS;
    const mods = sp?.modules;
    if (mods && mods.length > 0) return SOCIAL_MODULES.filter(m => mods.includes(m.id));
    return TABS; // fallback pour anciens espaces
  };

  const defaultTab = (mods) => mods[0]?.id || (spaceMode === "coworking" ? "taches" : "activites");

  const [activeTab,    setActiveTab]    = useState(() => defaultTab(getSpaceModules(space)));
  const [recentTabs,   setRecentTabs]   = useState(() => {
    const mods = getSpaceModules(space);
    return mods.slice(0, 2).map(m => m.id);
  });
  const [fabOpen,      setFabOpen]      = useState(false);
  const [showInfo,     setShowInfo]     = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showModules,  setShowModules]  = useState(false);
  const [editModules,  setEditModules]  = useState([]);
  const [liveSpace,    setLiveSpace]    = useState(space);
  const [copied,       setCopied]       = useState(false);
  const { showConfirm, ConfirmModal } = useConfirm();

  const spaceModules = getSpaceModules(liveSpace);

  const navigateTo = (tabId) => {
    setActiveTab(tabId);
    setFabOpen(false);
    if (spaceModules.length > 4) {
      setRecentTabs(prev => {
        const filtered = prev.filter(id => id !== tabId);
        return [tabId, ...filtered].slice(0, 2);
      });
    }
  };

  useEffect(() => {
    const unsub = db.collection("spaces").doc(space.id).onSnapshot(doc => {
      if (doc.exists) setLiveSpace({ id: doc.id, ...doc.data() });
      else onBack();
    });
    return unsub;
  }, [space.id]);

  const members   = liveSpace?.members || [];
  const isCreator = liveSpace?.createdBy === user.uid;

  const copyCode = () => {
    navigator.clipboard.writeText(liveSpace?.inviteCode || "").then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    });
  };

  const kickMember = async (m) => {
    if (!await showConfirm(`Exclure ${m.name} de l'espace ?`)) return;
    await db.collection("spaces").doc(space.id).update({
      memberIds: firebase.firestore.FieldValue.arrayRemove(m.uid),
      members:   firebase.firestore.FieldValue.arrayRemove(m),
    });
  };

  const leaveSpace = async () => {
    if (!await showConfirm("Quitter cet espace ?")) return;
    const me = members.find(m => m.uid === user.uid);
    await db.collection("spaces").doc(space.id).update({
      memberIds: firebase.firestore.FieldValue.arrayRemove(user.uid),
      members:   me ? firebase.firestore.FieldValue.arrayRemove(me) : firebase.firestore.FieldValue.arrayRemove({}),
    });
    onBack();
  };

  const deleteSpace = async () => {
    if (!await showConfirm("Supprimer définitivement cet espace ? Toutes les données seront perdues.")) return;
    await db.collection("spaces").doc(space.id).delete();
    onBack();
  };

  return (
    <div className="max-w-md mx-auto min-h-screen">
      {/* Header sticky */}
      <div className="gradient-bg px-4 pt-4 pb-2 flex items-center justify-between sticky top-0 z-50">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex items-center justify-center text-white font-bold text-2xl w-9 h-9 rounded-full" style={{ background: "rgba(0,0,0,0.25)" }}>‹</button>
          <div>
            <h1 className="text-white font-bold text-base leading-tight">{liveSpace?.name}</h1>
            <div className="flex items-center gap-1">
              {members.map(m => <span key={m.uid} className="text-sm">{m.emoji}</span>)}
              <span className="text-white/60 text-xs ml-1">{members.length} membre{members.length > 1 ? "s" : ""}</span>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setShowSettings(true)} className="text-white/70 px-2 py-1 rounded-full text-base"
            style={{ background: "rgba(0,0,0,0.25)" }}>⚙️</button>
          <button onClick={() => setShowInfo(true)} className="text-white/70 px-2.5 py-1 rounded-full text-sm font-bold"
            style={{ background: "rgba(0,0,0,0.25)" }}>⋯</button>
        </div>
      </div>

      {/* Contenu selon onglet actif */}
      {spaceMode === "focus" ? (
        <>
          {activeTab === "focus_today" && <FocusScreen spaceId={space.id} user={user} />}
          {activeTab === "depenses"    && <DepensesTab spaceId={space.id} user={user} members={members} />}
          {activeTab === "repas"       && <FocusRepasTab spaceId={space.id} user={user} />}
        </>
      ) : spaceMode === "coworking" ? (
        <>
          {activeTab === "taches"  && <TachesTab  spaceId={space.id} user={user} members={members} />}
          {activeTab === "projets" && <ProjetsTab spaceId={space.id} user={user} members={members} />}
          {activeTab === "notes"   && <NotesTab   spaceId={space.id} user={user} members={members} />}
          {activeTab === "liens"   && <LiensTab   spaceId={space.id} user={user} members={members} />}
          {activeTab === "chat"    && <ChatTab    spaceId={space.id} user={user} userData={userData} members={members} />}
        </>
      ) : (
        <>
          {activeTab === "activites" && <ActivitesTab spaceId={space.id} user={user} members={members} />}
          {activeTab === "idees"     && <IdeesTab     spaceId={space.id} user={user} members={members} />}
          {activeTab === "films"     && <FilmsTab     spaceId={space.id} user={user} members={members} />}
          {activeTab === "musique"   && <MusiqueTab   spaceId={space.id} user={user} members={members} />}
          {activeTab === "jeux"      && <JeuxTab      spaceId={space.id} user={user} members={members} />}
          {activeTab === "depenses"  && <DepensesTab  spaceId={space.id} user={user} members={members} />}
          {activeTab === "repas"     && <RepasTab     spaceId={space.id} user={user} members={members} />}
        </>
      )}

      {/* Barre de navigation en bas */}
      <div className="bottom-nav">
          {spaceModules.length <= 4 ? (
            /* Mode normal : ≤ 4 modules */
            <div className="flex">
              {spaceModules.map(tab => (
                <button key={tab.id} onClick={() => navigateTo(tab.id)} className={`flex-1 flex flex-col items-center py-2 tab-btn ${activeTab === tab.id ? "active" : ""}`}>
                  <span className="text-xl">{tab.emoji}</span>
                  <span className="text-xs mt-0.5 font-medium">{tab.label}</span>
                  {activeTab === tab.id && <span className="w-1 h-1 rounded-full mt-0.5" style={{ background: "var(--accent)" }} />}
                </button>
              ))}
            </div>
          ) : (
            /* Mode FAB : > 4 modules — dernier utilisé | FAB | avant-dernier */
            <>
              {fabOpen && (
                <div className="fixed inset-0 z-40" style={{ backdropFilter: "blur(6px)", background: "rgba(0,0,0,0.55)" }}
                  onClick={() => setFabOpen(false)}>
                  <div className="absolute bottom-20 left-1/2 -translate-x-1/2 w-56 rounded-2xl p-2 shadow-2xl"
                    style={{ background: "var(--card)", border: "1px solid var(--border)" }}
                    onClick={e => e.stopPropagation()}>
                    {spaceModules.filter(m => !recentTabs.includes(m.id)).map(tab => (
                      <button key={tab.id} onClick={() => navigateTo(tab.id)}
                        className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl"
                        style={{ background: activeTab === tab.id ? "var(--input-bg)" : "transparent" }}>
                        <span className="text-xl">{tab.emoji}</span>
                        <span className="font-medium text-sm" style={{ color: "var(--text)" }}>{tab.label}</span>
                        {activeTab === tab.id && <span className="ml-auto w-2 h-2 rounded-full" style={{ background: "var(--accent)" }} />}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div className="flex items-center">
                {/* Gauche : dernier utilisé */}
                {(() => {
                  const tab = spaceModules.find(m => m.id === recentTabs[0]);
                  return tab ? (
                    <button onClick={() => navigateTo(tab.id)}
                      className={`flex-1 flex flex-col items-center py-2 tab-btn ${activeTab === tab.id ? "active" : ""}`}>
                      <span className="text-xl">{tab.emoji}</span>
                      <span className="text-xs mt-0.5 font-medium">{tab.label}</span>
                      {activeTab === tab.id && <span className="w-1 h-1 rounded-full mt-0.5" style={{ background: "var(--accent)" }} />}
                    </button>
                  ) : <div className="flex-1" />;
                })()}
                {/* Centre : FAB */}
                <div className="flex-1 flex justify-center">
                  <button onClick={() => setFabOpen(o => !o)}
                    className="gradient-bg w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-transform"
                    style={{ marginTop: "-18px", transform: fabOpen ? "rotate(45deg)" : "none" }}>
                    <span className="text-white font-bold text-xl leading-none">{fabOpen ? "×" : "⋯"}</span>
                  </button>
                </div>
                {/* Droite : avant-dernier utilisé */}
                {(() => {
                  const tab = spaceModules.find(m => m.id === recentTabs[1]);
                  return tab ? (
                    <button onClick={() => navigateTo(tab.id)}
                      className={`flex-1 flex flex-col items-center py-2 tab-btn ${activeTab === tab.id ? "active" : ""}`}>
                      <span className="text-xl">{tab.emoji}</span>
                      <span className="text-xs mt-0.5 font-medium">{tab.label}</span>
                      {activeTab === tab.id && <span className="w-1 h-1 rounded-full mt-0.5" style={{ background: "var(--accent)" }} />}
                    </button>
                  ) : <div className="flex-1" />;
                })()}
              </div>
            </>
          )}
        </div>

      {/* Modal infos espace */}
      {showInfo && (
        <div className="modal-overlay" onClick={() => setShowInfo(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-lg">{liveSpace?.name}</h3>
              <button onClick={() => setShowInfo(false)} className="text-2xl" style={{ color: "var(--inactive)" }}>×</button>
            </div>

            <p className="text-xs uppercase tracking-wider mb-2" style={{ color: "var(--secondary)" }}>Code d'invitation</p>
            <button onClick={copyCode} className="w-full rounded-xl p-4 mb-5 flex items-center justify-between" style={{ background: "var(--input-bg)", border: "1px solid var(--border)" }}>
              <span className="text-2xl font-bold tracking-widest text-white">{liveSpace?.inviteCode}</span>
              <span className="text-sm" style={{ color: copied ? "#4ade80" : "var(--secondary)" }}>{copied ? "Copié ✓" : "Copier"}</span>
            </button>

            <p className="text-xs uppercase tracking-wider mb-3" style={{ color: "var(--secondary)" }}>Membres ({members.length})</p>
            {members.map((m, i) => (
              <div key={m.uid} className="flex items-center gap-3 py-2.5" style={{ borderBottom: "1px solid var(--border)" }}>
                <span className="text-2xl">{m.emoji}</span>
                <div className="flex-1">
                  <span className="font-medium">{m.name}</span>
                  {m.uid === user.uid && <span className="text-xs ml-2" style={{ color: "var(--inactive)" }}>(moi)</span>}
                  {m.uid === liveSpace?.createdBy && <span className="text-xs ml-2" style={{ color: "var(--grad2)" }}>admin</span>}
                </div>
                {isCreator && m.uid !== user.uid ? (
                  <button onClick={() => kickMember(m)} className="text-xs px-2 py-1 rounded-lg"
                    style={{ background: "#2d1520", color: "#f87171" }}>Exclure</button>
                ) : (
                  <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: badgeStyle(i).bg, color: badgeStyle(i).text }}>
                    {m.emoji}
                  </span>
                )}
              </div>
            ))}

            {spaceMode === "social" && (
              <div className="mt-5 mb-1">
                <p className="text-xs uppercase tracking-wider mb-2" style={{ color: "var(--secondary)" }}>Modules actifs</p>
                <div className="flex flex-wrap gap-2 mb-3">
                  {spaceModules.map(m => (
                    <span key={m.id} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium"
                      style={{ background: "var(--input-bg)", border: "1px solid var(--border)", color: "var(--text)" }}>
                      {m.emoji} {m.label}
                    </span>
                  ))}
                </div>
                <button onClick={() => { setEditModules(liveSpace?.modules || TABS.map(t=>t.id)); setShowModules(true); setShowInfo(false); }}
                  className="w-full py-2.5 rounded-xl text-sm font-semibold"
                  style={{ background: "var(--input-bg)", color: "var(--accent)", border: "1px solid var(--accent)", opacity: 0.9 }}>
                  ⚙️ Gérer les modules
                </button>
              </div>
            )}

            <div className="mt-3 flex flex-col gap-2">
              <button onClick={leaveSpace} className="w-full py-3 rounded-xl text-sm font-semibold"
                style={{ background: "var(--input-bg)", color: "var(--secondary)", border: "1px solid var(--border)" }}>
                Quitter l'espace
              </button>
              {isCreator && (
                <button onClick={deleteSpace} className="w-full py-3 rounded-xl text-sm font-semibold"
                  style={{ background: "#2d1520", color: "#f87171" }}>
                  Supprimer l'espace
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Modal paramètres */}
      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          user={user}
          currentThemeId={currentThemeId}
          onThemeChange={onThemeChange}
        />
      )}

      {/* Modal gestion des modules */}
      {showModules && (
        <div className="modal-overlay" onClick={() => setShowModules(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-bold text-lg">Modules de l'espace</h3>
              <button onClick={() => setShowModules(false)} className="text-2xl" style={{ color: "var(--inactive)" }}>×</button>
            </div>
            <p className="text-sm mb-4" style={{ color: "var(--secondary)" }}>Active ou désactive les modules. Les données existantes sont conservées.</p>
            <div className="flex flex-col gap-2 mb-5">
              {SOCIAL_MODULES.map(m => {
                const active = editModules.includes(m.id);
                return (
                  <button key={m.id}
                    onClick={() => setEditModules(prev => prev.includes(m.id) ? prev.filter(x => x !== m.id) : [...prev, m.id])}
                    className="w-full text-left p-3.5 rounded-2xl flex items-center gap-3 transition-all"
                    style={{
                      background: active ? "rgba(244,114,182,0.1)" : "var(--input-bg)",
                      border: `2px solid ${active ? "var(--accent)" : "var(--border)"}`,
                    }}>
                    <span className="text-2xl">{m.emoji}</span>
                    <div className="flex-1">
                      <p className="font-semibold text-sm" style={{ color: "var(--text)" }}>{m.label}</p>
                      <p className="text-xs" style={{ color: "var(--secondary)" }}>{m.desc}</p>
                    </div>
                    <span className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold"
                      style={{ background: active ? "var(--accent)" : "var(--border)", color: active ? "white" : "var(--inactive)" }}>
                      {active ? "✓" : ""}
                    </span>
                  </button>
                );
              })}
            </div>
            <button
              onClick={async () => {
                if (editModules.length === 0) return;
                await db.collection("spaces").doc(space.id).update({ modules: editModules });
                // Si l'onglet actif n'est plus dans les modules, passer au premier disponible
                if (!editModules.includes(activeTab)) {
                  const newMods = SOCIAL_MODULES.filter(m => editModules.includes(m.id));
                  navigateTo(newMods[0]?.id || editModules[0]);
                }
                setShowModules(false);
              }}
              disabled={editModules.length === 0}
              className="gradient-bg w-full text-white font-bold py-3 rounded-xl"
              style={{ opacity: editModules.length === 0 ? 0.5 : 1 }}>
              Enregistrer ({editModules.length} modules)
            </button>
          </div>
        </div>
      )}

      {/* Modal confirmation */}
      {ConfirmModal}
    </div>
  );
}

// ================================================================
//  APP ROOT
// ================================================================
function App() {
  const [user,         setUser]         = useState(undefined);
  const [userData,     setUserData]     = useState(null);
  const [currentSpace, setCurrentSpace] = useState(null);
  const [themeId,      setThemeId]      = useState("foret");

  // Init thème depuis localStorage
  useEffect(() => {
    const saved = localStorage.getItem('planio-theme');
    const theme = THEMES.find(t => t.id === saved) || THEMES[0]; // default: Forêt
    setThemeId(theme.id);
    applyTheme(theme);
  }, []);

  useEffect(() => {
    let unsubUser = null;
    const unsubAuth = auth.onAuthStateChanged((u) => {
      setUser(u);
      if (unsubUser) { unsubUser(); unsubUser = null; }
      if (u) {
        askAndSavePush(u.uid);
        unsubUser = db.collection("users").doc(u.uid).onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            setUserData(data);
            const savedThemeId = data?.settings?.theme;
            if (savedThemeId) {
              const t = THEMES.find(th => th.id === savedThemeId);
              if (t) { setThemeId(t.id); applyTheme(t); }
            }
          }
        });
      } else {
        setUserData(null);
      }
    });
    return () => { unsubAuth(); if (unsubUser) unsubUser(); };
  }, []);

  const handleThemeChange = (theme) => {
    setThemeId(theme.id);
    applyTheme(theme);
    if (user?.uid) {
      db.collection('users').doc(user.uid).set({ settings: { theme: theme.id } }, { merge: true }).catch(() => {});
    }
  };

  if (user === undefined) return <Spinner />;
  if (!user) return <AuthScreen onDone={setUser} />;

  if (!currentSpace) return (
    <HomeScreen
      user={user}
      userData={userData}
      onEnterSpace={setCurrentSpace}
      currentThemeId={themeId}
      onThemeChange={handleThemeChange}
    />
  );

  return (
    <SpaceScreen
      user={user}
      userData={userData}
      space={currentSpace}
      onBack={() => setCurrentSpace(null)}
      currentThemeId={themeId}
      onThemeChange={handleThemeChange}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
