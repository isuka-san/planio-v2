// ================================================================
//  HOOK : modal de confirmation (remplace window.confirm pour PWA)
// ================================================================
const useConfirm = () => {
  const [state, setState] = useState({ open: false, message: '', resolve: null });
  const showConfirm = (message) => new Promise(resolve => {
    setState({ open: true, message, resolve });
  });
  const handleYes = () => { state.resolve(true);  setState({ open: false, message: '', resolve: null }); };
  const handleNo  = () => { state.resolve(false); setState({ open: false, message: '', resolve: null }); };
  const ConfirmModal = state.open ? (
    <div className="fixed inset-0 z-[200] flex items-center justify-center" style={{ background: 'rgba(0,0,0,0.65)' }}>
      <div className="rounded-2xl p-6 mx-4 max-w-sm w-full shadow-xl" style={{ background: 'var(--card)', border: '1px solid var(--border)' }}>
        <p className="text-base mb-5 text-center" style={{ color: 'var(--text)' }}>{state.message}</p>
        <div className="flex gap-3">
          <button onClick={handleNo}  className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ background: 'var(--input-bg)', color: 'var(--secondary)', border: '1px solid var(--border)' }}>Annuler</button>
          <button onClick={handleYes} className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ background: '#2d1520', color: '#f87171' }}>Confirmer</button>
        </div>
      </div>
    </div>
  ) : null;
  return { showConfirm, ConfirmModal };
};

// ⚠️  Remplis ta VAPID key : Firebase Console → Project Settings

const VAPID_KEY = "BEgkKzE2hnal-LmeyQMmAgiIZK0vh-hJuuCOZyrrwCaO2DBEgjwD9xUThnGu1Lt_MkPF0Fjdnd4GftFLsmlYZA8";
let messaging = null;

async function _saveFcmToken(uid) {
  if (!messaging || !uid || !VAPID_KEY || Notification.permission !== "granted") return;
  try {
    const sw = await navigator.serviceWorker.register("/planio-v2/firebase-messaging-sw.js");
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: sw });
    if (token) await db.collection("users").doc(uid).set({ fcmToken: token }, { merge: true });
  } catch(e) { console.warn("FCM token:", e.message); }
}

async function askAndSavePush(uid) {
  if (!("Notification" in window) || !VAPID_KEY) return;
  if (Notification.permission === "granted") { _saveFcmToken(uid); return; }
  if (Notification.permission === "denied")  return;
  const p = await Notification.requestPermission();
  if (p === "granted") _saveFcmToken(uid);
}

// ================================================================
//  HOOK : écoute en temps réel une sous-collection Firestore
// ================================================================
function useCollection(path) {
  const [items, setItems] = useState([]);
  useEffect(() => {
    if (!path) return;
    const unsub = db.collection(path)
      .orderBy("createdAt", "desc")
      .onSnapshot(
        snap => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
        err  => console.error("Firestore error:", err)
      );
    return unsub;
  }, [path]);
  return items;
}

// ================================================================

// ================================================================
function AuthScreen({ onDone }) {
  const [mode, setMode]       = useState("login");
  const [email, setEmail]     = useState("");
  const [pwd, setPwd]         = useState("");
  const [name, setName]       = useState("");
  const [emoji, setEmoji]     = useState("🦖");
  const [err, setErr]         = useState("");
  const [busy, setBusy]       = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setBusy(true);
    try {
      if (mode === "login") {
        await auth.signInWithEmailAndPassword(email, pwd);
      } else {
        if (!name.trim()) { setErr("Choisis un pseudo"); setBusy(false); return; }
        const cred = await auth.createUserWithEmailAndPassword(email, pwd);
        await db.collection("users").doc(cred.user.uid).set({
          name: name.trim(), emoji,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await cred.user.updateProfile({ displayName: name.trim() });
      }
    } catch (ex) {
      const msgs = {
        "auth/email-already-in-use":  "Cet email est déjà utilisé.",
        "auth/invalid-email":         "Email invalide.",
        "auth/weak-password":         "Mot de passe trop court (6 caractères min).",
        "auth/user-not-found":        "Compte introuvable.",
        "auth/wrong-password":        "Mot de passe incorrect.",
        "auth/invalid-credential":    "Email ou mot de passe incorrect.",
      };
      setErr(msgs[ex.code] || ex.message);
    } finally { setBusy(false); }
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-5">
      <div className="w-full max-w-sm">
        <div className="gradient-bg rounded-2xl p-6 mb-5 text-center">
          <h1 className="text-white font-bold text-3xl">Planio</h1>
          <p className="text-white/70 text-sm mt-1">listes partagées entre potes</p>
        </div>

        <div className="card p-5">
          <div className="flex mb-5 rounded-xl overflow-hidden" style={{ border: "1px solid var(--border)" }}>
            {["login", "register"].map(m => (
              <button key={m} onClick={() => { setMode(m); setErr(""); }}
                className="flex-1 py-2.5 text-sm font-semibold transition-all"
                style={mode === m ? { background: "linear-gradient(135deg,var(--grad1),var(--grad2))", color: "white" } : { color: "var(--inactive)" }}>
                {m === "login" ? "Connexion" : "Créer un compte"}
              </button>
            ))}
          </div>

          <form onSubmit={submit}>
            {mode === "register" && (
              <>
                <label className="block text-xs text-[#9791b0] uppercase tracking-wider mb-1">Pseudo</label>
                <input value={name} onChange={e => setName(e.target.value)} placeholder="Ton pseudo"
                  className="w-full border rounded-xl p-3 text-sm mb-4" autoComplete="username" />

                <label className="block text-xs text-[#9791b0] uppercase tracking-wider mb-2">Ton emoji</label>
                <div className="flex flex-wrap gap-2 mb-5">
                  {EMOJIS.map(em => (
                    <button key={em} type="button" onClick={() => setEmoji(em)}
                      className="w-10 h-10 rounded-full text-xl flex items-center justify-center transition-all"
                      style={{ background: "var(--input-bg)", outline: emoji === em ? "2px solid var(--accent)" : "none", transform: emoji === em ? "scale(1.15)" : "scale(1)" }}>
                      {em}
                    </button>
                  ))}
                </div>
              </>
            )}

            <label className="block text-xs text-[#9791b0] uppercase tracking-wider mb-1">Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="ton@email.com"
              className="w-full border rounded-xl p-3 text-sm mb-4" autoComplete="email" />

            <label className="block text-xs text-[#9791b0] uppercase tracking-wider mb-1">Mot de passe</label>
            <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} placeholder="••••••••"
              className="w-full border rounded-xl p-3 text-sm mb-4" autoComplete={mode === "login" ? "current-password" : "new-password"} />

            {err && <p className="text-red-400 text-xs mb-3 p-2 rounded-lg" style={{ background: "rgba(239,68,68,0.1)" }}>{err}</p>}

            <button type="submit" disabled={busy} className="w-full gradient-bg text-white font-bold py-3 rounded-xl" style={{ opacity: busy ? 0.7 : 1 }}>
              {busy ? "…" : mode === "login" ? "Se connecter" : "Créer mon compte"}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

function SettingsModal({ onClose, user, currentThemeId, onThemeChange }) {
  const [oldPwd,  setOldPwd]  = useState("");

  const [pwdErr,  setPwdErr]  = useState("");
  const [pwdOk,   setPwdOk]   = useState(false);
  const [busy,    setBusy]    = useState(false);

  const changePwd = async () => {
    if (newPwd.length < 6)   { setPwdErr("6 caractères minimum."); return; }
    if (newPwd !== confPwd)  { setPwdErr("Les mots de passe ne correspondent pas."); return; }
    setBusy(true); setPwdErr(""); setPwdOk(false);
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, oldPwd);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPwd);
      setPwdOk(true);
      setOldPwd(""); setNewPwd(""); setConfPwd("");
    } catch (ex) {
      const msgs = {
        "auth/wrong-password":    "Mot de passe actuel incorrect.",
        "auth/too-many-requests": "Trop de tentatives, réessaie plus tard.",
        "auth/invalid-credential":"Mot de passe actuel incorrect.",
      };
      setPwdErr(msgs[ex.code] || ex.message);
    } finally { setBusy(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between mb-6">
          <h3 className="font-bold text-lg">Paramètres ⚙️</h3>
          <button onClick={onClose} className="text-2xl leading-none" style={{ color: "var(--inactive)" }}>×</button>
        </div>

        {/* Thème */}
        <p className="text-xs uppercase tracking-wider mb-3" style={{ color: "var(--secondary)" }}>Thème</p>
        <div className="flex gap-2 mb-6 flex-wrap">
          {THEMES.map(t => (
            <button key={t.id} onClick={() => onThemeChange(t)}
              className="flex-1 min-w-[56px] flex flex-col items-center gap-1.5 py-2.5 px-1 rounded-xl transition-all"
              style={{
                background: currentThemeId === t.id ? t.card : "transparent",
                border: `2px solid ${currentThemeId === t.id ? t.accent : t.border}`,
              }}>
              <div className="w-8 h-8 rounded-full" style={{ background: t.accent, boxShadow: currentThemeId === t.id ? `0 0 12px ${t.accent}88` : 'none' }} />
              <span className="text-xs font-medium" style={{ color: currentThemeId === t.id ? t.text : "var(--inactive)" }}>{t.name}</span>
            </button>
          ))}
        </div>

        {/* Changer mot de passe */}
        <p className="text-xs uppercase tracking-wider mb-3" style={{ color: "var(--secondary)" }}>Changer le mot de passe</p>
        <input type="password" placeholder="Mot de passe actuel" value={oldPwd} onChange={e => setOldPwd(e.target.value)}
          className="w-full border rounded-xl p-3 text-sm mb-3" autoComplete="current-password" />
        <input type="password" placeholder="Nouveau mot de passe" value={newPwd} onChange={e => setNewPwd(e.target.value)}
          className="w-full border rounded-xl p-3 text-sm mb-3" autoComplete="new-password" />
        <input type="password" placeholder="Confirmer le nouveau" value={confPwd} onChange={e => setConfPwd(e.target.value)}
          className="w-full border rounded-xl p-3 text-sm mb-2" autoComplete="new-password" />
        {pwdErr && <p className="text-red-400 text-xs mb-2 p-2 rounded-lg" style={{ background: "rgba(239,68,68,0.1)" }}>{pwdErr}</p>}
        {pwdOk  && <p className="text-green-400 text-xs mb-2 p-2 rounded-lg" style={{ background: "rgba(74,222,128,0.1)" }}>Mot de passe modifié ✓</p>}
        <button onClick={changePwd} disabled={busy || !oldPwd || !newPwd || !confPwd}
          className="w-full gradient-bg text-white font-semibold py-3 rounded-xl mb-5"
          style={{ opacity: busy || !oldPwd || !newPwd || !confPwd ? 0.5 : 1 }}>
          {busy ? "…" : "Modifier le mot de passe"}
        </button>

        {/* Déconnexion */}
        <button onClick={() => auth.signOut()}
          className="w-full py-3 rounded-xl text-sm font-semibold"
          style={{ background: "#2d1520", color: "#f87171" }}>
          Se déconnecter
        </button>
      </div>
    </div>
  );
}

// ================================================================

// ================================================================
function HomeScreen({ user, userData, onEnterSpace, currentThemeId, onThemeChange }) {
  const [spaces, setSpaces]         = useState([]);
  const [showCreate, setShowCreate] = useState(false);
  const [showJoin, setShowJoin]     = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [newName, setNewName]         = useState("");
  const [spaceMode, setSpaceMode]     = useState(null);
  const [createStep, setCreateStep]   = useState("mode");
  const [selectedMods, setSelectedMods] = useState(["activites","idees","films","musique","jeux"]);
  const [code, setCode]               = useState("");
  const [err, setErr]                 = useState("");
  const [busy, setBusy]               = useState(false);

  useEffect(() => {
    if (!user) return;
    const unsub = db.collection("spaces")
      .where("memberIds", "array-contains", user.uid)
      .onSnapshot(snap => setSpaces(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return unsub;
  }, [user]);

  const myMember = { uid: user.uid, name: userData?.name || user.displayName || "Moi", emoji: userData?.emoji || "🦖" };

  const createSpace = async () => {
    if (!newName.trim()) return;
    setBusy(true);
    const inviteCode = genCode();
    const mode = spaceMode || "social";
    const modules = mode === "social" ? selectedMods : null;
    const spaceData = {
      name:       newName.trim(),
      inviteCode,
      mode,
      createdBy:  user.uid,
      memberIds:  [user.uid],
      members:    [myMember],
      createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (modules) spaceData.modules = modules;
    const ref = await db.collection("spaces").add(spaceData);
    setBusy(false); setShowCreate(false); setNewName(""); setSpaceMode(null); setCreateStep("mode"); setSelectedMods(["activites","idees","films","musique","jeux"]);
    onEnterSpace({ id: ref.id, name: newName.trim(), inviteCode, mode, modules, members: [myMember], memberIds: [user.uid] });
  };

  const toggleMod = (id) => setSelectedMods(prev =>
    prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]
  );

  const joinSpace = async () => {
    const trimmed = code.trim().toUpperCase();
    if (!trimmed) return;
    setErr(""); setBusy(true);
    try {
      const snap = await db.collection("spaces").where("inviteCode", "==", trimmed).get();
      if (snap.empty) { setErr("Code invalide — vérifie les caractères."); setBusy(false); return; }
      const doc   = snap.docs[0];
      const space = { id: doc.id, ...doc.data() };
      if (!(space.memberIds || []).includes(user.uid)) {
        await doc.ref.update({
          memberIds: firebase.firestore.FieldValue.arrayUnion(user.uid),
          members:   firebase.firestore.FieldValue.arrayUnion(myMember),
        });
      }
      setShowJoin(false); setCode(""); setBusy(false);
      onEnterSpace({ ...space, members: [...(space.members || []), myMember] });
    } catch (ex) { setErr(ex.message); setBusy(false); }
  };

  return (
    <div className="min-h-screen p-4 max-w-md mx-auto">
      {/* Header */}
      <div className="gradient-bg rounded-2xl px-5 pt-5 pb-4 mb-5 flex items-start justify-between">
        <div>
          <h1 className="text-white font-bold text-2xl">Planio</h1>
          <p className="text-white/70 text-sm mt-0.5">
            {userData?.emoji || "👋"} {userData?.name || user.displayName || "Bienvenue"}
          </p>
        </div>
        <button onClick={() => setShowSettings(true)} className="text-xl text-white/70 px-3 py-1.5 rounded-full" style={{ background: "rgba(0,0,0,0.25)" }}>
          ⚙️
        </button>
      </div>

      {/* Actions */}
      <div className="flex gap-3 mb-5">
        <button onClick={() => setShowCreate(true)} className="flex-1 gradient-bg text-white font-semibold py-3 rounded-xl text-sm">
          + Créer un espace
        </button>
        <button onClick={() => { setShowJoin(true); setErr(""); }} className="flex-1 text-white font-semibold py-3 rounded-xl text-sm" style={{ background: "var(--input-bg)", border: "1px solid var(--border)" }}>
          Rejoindre
        </button>
      </div>

      {/* Liste des espaces */}
      {spaces.length === 0 ? (
        <EmptyState emoji="🚀" text="Crée ou rejoins un espace pour commencer" />
      ) : (
        <div className="flex flex-col gap-3">
          {spaces.map(s => (
            <button key={s.id} onClick={() => onEnterSpace(s)} className="card w-full p-4 text-left flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-2xl">{SPACE_MODES.find(m => m.id === s.mode)?.emoji || "👥"}</span>
                <div>
                  <p className="font-semibold">{s.name}</p>
                  <p className="text-sm mt-0.5" style={{ color: "var(--inactive)" }}>
                    {(s.members || []).map(m => m.emoji).join(" ")} · {(s.memberIds || []).length} membre{(s.memberIds || []).length > 1 ? "s" : ""}
                  </p>
                </div>
              </div>
              <span className="text-xl" style={{ color: "var(--inactive)" }}>›</span>
            </button>
          ))}
        </div>
      )}

      {/* Modal créer — 3 étapes (mode → nom → modules pour social) */}
      {showCreate && (
        <div className="modal-overlay" onClick={() => { setShowCreate(false); setCreateStep("mode"); setSpaceMode(null); setNewName(""); setSelectedMods(["activites","idees","films","musique","jeux"]); }}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-lg">
                {createStep === "mode" ? "Quel type d'espace ?" : createStep === "name" ? "Nouvel espace" : "Choisir les modules"}
              </h3>
              <button onClick={() => { setShowCreate(false); setCreateStep("mode"); setSpaceMode(null); setNewName(""); setSelectedMods(["activites","idees","films","musique","jeux"]); }} className="text-2xl" style={{ color: "var(--inactive)" }}>×</button>
            </div>

            {createStep === "mode" && (
              <>
                <p className="text-sm mb-4" style={{ color: "var(--secondary)" }}>Choisis un mode pour adapter l'interface.</p>
                <div className="flex flex-col gap-3 mb-2">
                  {SPACE_MODES.map(m => (
                    <button key={m.id} onClick={() => { setSpaceMode(m.id); setCreateStep("name"); }}
                      className="w-full text-left p-4 rounded-2xl flex items-center gap-4 transition-all"
                      style={{ background: "var(--input-bg)", border: "2px solid var(--border)" }}>
                      <span className="text-4xl">{m.emoji}</span>
                      <div>
                        <p className="font-bold text-base" style={{ color: "var(--text)" }}>{m.name}</p>
                        <p className="text-sm" style={{ color: "var(--secondary)" }}>{m.desc}</p>
                      </div>
                    </button>
                  ))}
                </div>
              </>
            )}

            {createStep === "name" && (
              <>
                <div className="flex items-center gap-2 mb-4 p-3 rounded-xl" style={{ background: "var(--input-bg)", border: "1px solid var(--border)" }}>
                  <span className="text-2xl">{SPACE_MODES.find(m => m.id === spaceMode)?.emoji}</span>
                  <span className="font-medium" style={{ color: "var(--secondary)" }}>{SPACE_MODES.find(m => m.id === spaceMode)?.name}</span>
                  <button onClick={() => setCreateStep("mode")} className="ml-auto text-xs px-2 py-1 rounded-lg" style={{ color: "var(--accent)", background: "transparent" }}>Changer</button>
                </div>
                <label className="block text-xs uppercase tracking-wider mb-1" style={{ color: "var(--secondary)" }}>Nom de l'espace</label>
                <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Ex: Vacances, Coloc, Planio…"
                  className="w-full border rounded-xl p-3 text-sm mb-4" autoFocus />
                <button
                  onClick={() => spaceMode === "social" ? setCreateStep("modules") : createSpace()}
                  disabled={busy || !newName.trim()}
                  className="gradient-bg w-full text-white font-bold py-3 rounded-xl"
                  style={{ opacity: busy || !newName.trim() ? 0.6 : 1 }}>
                  {spaceMode === "social" ? "Suivant →" : busy ? "…" : "Créer l'espace"}
                </button>
              </>
            )}

            {createStep === "modules" && (
              <>
                <p className="text-sm mb-4" style={{ color: "var(--secondary)" }}>Sélectionne les modules à activer. Tu pourras les modifier à tout moment.</p>
                <div className="flex flex-col gap-2 mb-5">
                  {SOCIAL_MODULES.map(m => {
                    const active = selectedMods.includes(m.id);
                    return (
                      <button key={m.id} onClick={() => toggleMod(m.id)}
                        className="w-full text-left p-3.5 rounded-2xl flex items-center gap-3 transition-all"
                        style={{
                          background: active ? "rgba(var(--grad1-rgb, 249,168,212), 0.12)" : "var(--input-bg)",
                          border: `2px solid ${active ? "var(--accent)" : "var(--border)"}`,
                        }}>
                        <span className="text-2xl">{m.emoji}</span>
                        <div className="flex-1">
                          <p className="font-semibold text-sm" style={{ color: "var(--text)" }}>{m.label}</p>
                          <p className="text-xs" style={{ color: "var(--secondary)" }}>{m.desc}</p>
                        </div>
                        <span className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold"
                          style={{ background: active ? "var(--accent)" : "var(--border)", color: active ? "white" : "var(--inactive)" }}>
                          {active ? "✓" : ""}
                        </span>
                      </button>
                    );
                  })}
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setCreateStep("name")} className="flex-1 py-3 rounded-xl text-sm font-semibold"
                    style={{ background: "var(--input-bg)", color: "var(--secondary)", border: "1px solid var(--border)" }}>← Retour</button>
                  <button onClick={createSpace} disabled={busy || selectedMods.length === 0}
                    className="flex-1 gradient-bg text-white font-bold py-3 rounded-xl"
                    style={{ opacity: busy || selectedMods.length === 0 ? 0.6 : 1 }}>
                    {busy ? "…" : `Créer (${selectedMods.length} modules)`}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Modal rejoindre */}
      {showJoin && (
        <div className="modal-overlay" onClick={() => setShowJoin(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-lg">Rejoindre un espace</h3>
              <button onClick={() => setShowJoin(false)} className="text-2xl" style={{ color: "var(--inactive)" }}>×</button>
            </div>
            <label className="block text-xs uppercase tracking-wider mb-1" style={{ color: "var(--secondary)" }}>Code d'invitation</label>
            <input value={code} onChange={e => setCode(e.target.value.toUpperCase())} placeholder="EX: XK7F2P"
              className="w-full border rounded-xl p-4 text-2xl font-bold tracking-widest text-center mb-1" maxLength={6} autoFocus />
            {err && <p className="text-red-400 text-xs mb-3">{err}</p>}
            <div className="h-3" />
            <button onClick={joinSpace} disabled={busy || code.trim().length < 6} className="gradient-bg w-full text-white font-bold py-3 rounded-xl" style={{ opacity: busy || code.trim().length < 6 ? 0.6 : 1 }}>
              {busy ? "…" : "Rejoindre"}
            </button>
          </div>
        </div>
      )}

      {/* Modal paramètres */}
      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          user={user}
          currentThemeId={currentThemeId}
          onThemeChange={(t) => { onThemeChange(t); }}
        />
      )}
    </div>
  );
}

// ---- Activités & Voyages ----
function ActivitesTab({ spaceId, user, members }) {
  const [sub, setSub]           = useState("activites");
  const [modal, setModal]       = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [uploading, setUploading] = useState({});
  const [lightbox, setLightbox]   = useState(null); // { url, itemId, idx }
  const { showConfirm, ConfirmModal } = useConfirm();
  const path  = spaceId ? `spaces/${spaceId}/${sub}` : null;
  const items = useCollection(path);

  const add = async (form) => {
    try { await db.collection(path).add({ title: form.title, desc: form.desc || "", date: form.date || "", by: user.uid, done: false, photos: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() }); }
    catch(e) { console.error('Erreur ajout:', e); alert('Erreur lors de l\'ajout. Réessaie.'); }
  };
  const edit = async (id, form) => {
    try { await db.collection(path).doc(id).update({ title: form.title, desc: form.desc || "", date: form.date || "" }); }
    catch(e) { console.error('Erreur modif:', e); alert('Erreur lors de la modification. Réessaie.'); }
  };
  const toggle = async (id, done) => {
    try { await db.collection(path).doc(id).update({ done: !done }); }
    catch(e) { console.error('Erreur toggle:', e); }
  };
  const del = async (id) => {
    if (!window.confirm('Supprimer cet élément ?')) return;
    try { await db.collection(path).doc(id).delete(); }
    catch(e) { console.error('Erreur suppression:', e); alert('Erreur lors de la suppression. Réessaie.'); }
  };
  // Compression aggressive → base64 ~20Ko, stocké directement dans Firestore
  const compressImage = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.55));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const uploadPhotos = async (itemId, files) => {
    if (!files || files.length === 0) return;
    setUploading(u => ({ ...u, [itemId]: true }));
    try {
      const newPhotos = [];
      for (const file of Array.from(files)) {
        const dataUrl = await compressImage(file);
        newPhotos.push({ dataUrl, name: file.name, uploadedAt: Date.now() });
      }
      const item = items.find(i => i.id === itemId);
      const existing = item?.photos || [];
      await db.collection(path).doc(itemId).update({ photos: [...existing, ...newPhotos] });
    } catch(e) {
      console.error('Erreur photo:', e);
      alert('Erreur upload : ' + (e.message || e));
    }
    finally { setUploading(u => ({ ...u, [itemId]: false })); }
  };

  const deletePhoto = async (itemId, photoIdx) => {
    const item = items.find(i => i.id === itemId);
    if (!item) return;
    const photos = (item.photos || []).filter((_, i) => i !== photoIdx);
    try { await db.collection(path).doc(itemId).update({ photos }); }
    catch(e) { alert('Erreur suppression photo : ' + (e.message || e)); }
  };

  return (
    <div className="pb-24">
      <div className="gradient-bg p-6 pb-4">
        <h2 className="text-white font-bold text-xl mb-4">Plans</h2>
        <div className="flex rounded-xl p-1 gap-1" style={{ background: "rgba(0,0,0,0.2)" }}>
          {[["activites","🎯 Activités"], ["voyages","✈️ Voyages"]].map(([t, lbl]) => (
            <button key={t} onClick={() => setSub(t)} className="flex-1 py-2 rounded-lg text-sm font-medium transition-all"
              style={sub === t ? { background: "white", color: "#be185d" } : { color: "white" }}>
              {lbl}
            </button>
          ))}
        </div>
      </div>

      <div className="p-4">
        <button onClick={() => setModal(true)} className="w-full gradient-bg text-white font-semibold py-3 rounded-xl mb-4 flex items-center justify-center gap-2">
          <span className="text-xl">+</span> Ajouter {sub === "activites" ? "une activité" : "un voyage"}
        </button>

        {items.length === 0
          ? <EmptyState emoji={sub === "activites" ? "🎯" : "✈️"} text={sub === "activites" ? "pas d'activité" : "pas de voyage"} />
          : items.map(item => (
            <div key={item.id} className="card p-4 mb-3" style={item.done ? { position: "relative", overflow: "hidden", background: "linear-gradient(135deg, rgba(134,239,172,0.18), rgba(16,185,129,0.1))", border: "1px solid rgba(74,222,128,0.45)", boxShadow: "0 4px 24px rgba(74,222,128,0.18), inset 0 1px 0 rgba(255,255,255,0.04)" } : { position: "relative" }}>
              {item.done && <div style={{ position: "absolute", right: "-10px", top: "-10px", fontSize: "5.5rem", opacity: 0.07, transform: "rotate(12deg)", lineHeight: 1, userSelect: "none", pointerEvents: "none" }}>{sub === "activites" ? "📸" : "🗺️"}</div>}
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1 flex-wrap">
                    <span className="font-semibold" style={{ color: item.done ? "#d1fae5" : "var(--text)", textShadow: item.done ? "0 0 10px rgba(74,222,128,0.25)" : "none" }}>{item.title}</span>
                    {item.done && <span style={{ background: "linear-gradient(135deg, rgba(74,222,128,0.25), rgba(16,185,129,0.15))", color: "#86efac", border: "1px solid rgba(74,222,128,0.5)", padding: "2px 10px", borderRadius: "999px", fontSize: "0.7rem", fontWeight: 700, letterSpacing: "0.03em", textShadow: "0 0 8px rgba(74,222,128,0.6)" }}>🗺️ Exploré</span>}
                    <UserBadge uid={item.by} members={members} />
                  </div>
                  {item.desc && <p className="text-sm mb-1" style={{ color: "var(--secondary)" }}>{item.desc}</p>}
                  {item.date && <p className="text-xs" style={{ color: "var(--grad1)" }}>📅 {new Date(item.date).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" })}</p>}
                </div>
                <div className="flex flex-col gap-1">
                  <button onClick={() => toggle(item.id, item.done)} className="w-8 h-8 rounded-full flex items-center justify-center text-sm"
                    style={item.done ? { background: "#1a3a2a", color: "#4ade80" } : { background: "var(--input-bg)", color: "var(--inactive)" }}>
                    {item.done ? "✓" : "○"}
                  </button>
                  <button onClick={() => setEditItem(item)} className="w-8 h-8 rounded-full flex items-center justify-center text-xs"
                    style={{ background: "var(--input-bg)", color: "var(--secondary)" }}>✎</button>
                  <button onClick={() => del(item.id)} className="w-8 h-8 rounded-full flex items-center justify-center text-xs"
                    style={{ background: "#2d1520", color: "#f87171" }}>✕</button>
                </div>
              </div>
              {item.done && (() => {
                const photos = item.photos || [];
                const visible = photos.slice(0, 3);
                const extra = photos.length - 3;
                return (
                  <div style={{ marginTop: "10px" }}>
                    {photos.length > 0 && (
                      <div className="flex gap-2 flex-wrap" style={{ marginBottom: "8px" }}>
                        {visible.map((p, i) => (
                          <div key={i} style={{ position: "relative", flexShrink: 0 }}>
                            <div onClick={() => setLightbox({ url: p.dataUrl || p.url, name: p.name, itemId: item.id, idx: i })} style={{ width: 56, height: 56, borderRadius: 10, overflow: "hidden", cursor: "pointer", border: "1.5px solid rgba(74,222,128,0.4)", position: "relative" }}>
                              <img src={p.dataUrl || p.url} alt={p.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                              {i === 2 && extra > 0 && (
                                <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", color: "#d1fae5", fontSize: "0.85rem", fontWeight: 700 }}>+{extra}</div>
                              )}
                            </div>

            <button onClick={async e => { e.stopPropagation(); if (await showConfirm('Supprimer cette photo ?')) { await deletePhoto(lightbox.itemId, lightbox.idx); setLightbox(null); } }} style={{ background: "#2d1520", border: "1px solid #f87171", color: "#f87171", padding: "8px 22px", borderRadius: 20, cursor: "pointer", fontSize: "0.9rem", fontWeight: 600 }}>🗑 Supprimer</button>

// ---- Films & Séries ----
function FilmsTab({ spaceId, user, members }) {
  const [modal,        setModal]        = useState(false);
  const [editItem,     setEditItem]     = useState(null);
  const [progressItem, setProgressItem] = useState(null);
  const [filter,       setFilter]       = useState("all");
  const { showConfirm, ConfirmModal } = useConfirm();
  const path  = spaceId ? `spaces/${spaceId}/films` : null;
  const items = useCollection(path);

  const fmtTime = (m) => {
    if (!m && m !== 0) return "—";
    return m < 60 ? `${m}min` : `${Math.floor(m / 60)}h${m % 60 > 0 ? String(m % 60).padStart(2, "0") : ""}`;
  };

  const getProgress = (item) => {
    if (item.type === "serie") {
      const total = (item.totalSeasons || 1) * (item.episodesPerSeason || 1);
      const done  = ((item.currentSeason || 1) - 1) * (item.episodesPerSeason || 1) + (item.currentEpisode || 0);
      return total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
    }
    const dur = item.duration || 0;
    return dur > 0 ? Math.min(100, Math.round((item.watchedMinutes || 0) / dur * 100)) : 0;
  };

  const update = async (id, data) => {
    try { await db.collection(path).doc(id).update(data); }
    catch(e) { console.error("update:", e); }
  };

  const add = async (form) => {
    const doc = {
      type: form.type || "film",
      title: form.title, genre: form.genre || "", desc: form.desc || "",
      completed: false, by: user.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (doc.type === "serie") {
      doc.totalSeasons = Number(form.totalSeasons) || 1;
      doc.episodesPerSeason = Number(form.episodesPerSeason) || 1;
      doc.currentSeason = 1; doc.currentEpisode = 0;
    } else {
      doc.duration = Number(form.duration) || 0;
      doc.watchedMinutes = 0;
    }
    try { await db.collection(path).add(doc); }
    catch(e) { console.error("add:", e); }
  };

  const nextEp = async (item) => {
    let s = item.currentSeason || 1, e = (item.currentEpisode || 0) + 1;
    if (e > (item.episodesPerSeason || 1)) { e = 1; s++; }
    const done = s > (item.totalSeasons || 1);
    await update(item.id, {
      currentSeason: done ? item.totalSeasons : s,
      currentEpisode: done ? item.episodesPerSeason : e,
      completed: done,
    });
  };

  const del = async (id) => {
    const ok = await showConfirm("Supprimer cet élément ?");
    if (!ok) return;
    try { await db.collection(path).doc(id).delete(); }
    catch(e) { console.error("del:", e); }
  };

  const filtered = items.filter(i => {
    if (filter === "progress") return !i.completed && getProgress(i) > 0;
    if (filter === "todo")     return !i.completed && getProgress(i) === 0;
    if (filter === "done")     return i.completed;
    return true;
  });

  const inProgress = items.filter(i => !i.completed && getProgress(i) > 0).length;

  return (
    <div className="pb-24">
      <div className="gradient-bg p-6">
        <h2 className="text-white font-bold text-xl mb-1">Films & Séries 🎬</h2>
        <p className="text-sm" style={{ color: "rgba(255,255,255,0.75)" }}>
          {inProgress > 0
            ? `${inProgress} en cours · ${items.filter(i => !i.completed).length - inProgress} à voir`
            : `${items.filter(i => !i.completed).length} à voir`}
        </p>
      </div>

      <div className="p-4">
        <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
          {[["all","Tous"],["progress","En cours"],["todo","À voir"],["done","Vus ✓"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)} className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap filter-btn ${filter===v?"active":""}`}>{l}</button>
          ))}
        </div>
        <button onClick={() => setModal(true)} className="w-full gradient-bg text-white font-semibold py-3 rounded-xl mb-4 flex items-center justify-center gap-2">
          <span className="text-xl">+</span> Ajouter
        </button>

        {filtered.length === 0
          ? <EmptyState emoji="🎬" text="Rien ici !" />
          : filtered.map(item => {
            const pct     = getProgress(item);
            const isSerie = item.type === "serie";
            return (
              <div key={item.id} className="card p-4 mb-3" style={item.completed ? { position: "relative", overflow: "hidden", background: "linear-gradient(135deg, rgba(167,139,250,0.18), rgba(109,40,217,0.1))", border: "1px solid rgba(139,92,246,0.45)", boxShadow: "0 4px 24px rgba(139,92,246,0.18), inset 0 1px 0 rgba(255,255,255,0.04)" } : { position: "relative" }}>
                {item.completed && <div style={{ position: "absolute", right: "-10px", top: "-10px", fontSize: "5.5rem", opacity: 0.07, transform: "rotate(12deg)", lineHeight: 1, userSelect: "none", pointerEvents: "none" }}>{isSerie ? "📺" : "🎬"}</div>}
                {/* En-tête */}
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
                      <span>{isSerie ? "📺" : "🎬"}</span>
                      <span className="font-semibold text-sm leading-tight" style={{ color: item.completed ? "#ede9fe" : "var(--text)", textShadow: item.completed ? "0 0 10px rgba(139,92,246,0.25)" : "none" }}>{item.title}</span>
                      {item.completed && <span style={{ background: "linear-gradient(135deg, rgba(139,92,246,0.25), rgba(109,40,217,0.15))", color: "#c4b5fd", border: "1px solid rgba(139,92,246,0.5)", padding: "2px 10px", borderRadius: "999px", fontSize: "0.7rem", fontWeight: 700, letterSpacing: "0.03em", textShadow: "0 0 8px rgba(139,92,246,0.6)" }}>✨ Vu</span>}
                      <UserBadge uid={item.by} members={members} />
                    </div>
                    {item.genre && <span className="inline-block text-xs px-2 py-0.5 rounded-full mt-0.5" style={{ background:"#2d1a40", color:"#d8b4fe" }}>{item.genre}</span>}
                  </div>
                  <div className="flex gap-1 shrink-0">
                    <button onClick={() => update(item.id, { completed: !item.completed })}
                      className="w-7 h-7 rounded-full flex items-center justify-center text-xs"
                      style={item.completed ? { background:"#1a3a2a", color:"#4ade80" } : { background:"var(--input-bg)", color:"var(--inactive)" }}>
                      {item.completed ? "✓" : "○"}
                    </button>
                    <button onClick={() => setEditItem(item)} className="w-7 h-7 rounded-full flex items-center justify-center text-xs"
                      style={{ background:"var(--input-bg)", color:"var(--secondary)" }}>✎</button>
                    <button onClick={() => del(item.id)} className="w-7 h-7 rounded-full flex items-center justify-center text-xs"
                      style={{ background:"#2d1520", color:"#f87171" }}>✕</button>
                  </div>
                </div>

                {/* Barre de progression */}
                {!item.completed && (
                  <div className="mb-2">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs" style={{ color:"var(--secondary)" }}>
                        {isSerie
                          ? `S${String(item.currentSeason||1).padStart(2,"0")}E${String(item.currentEpisode||0).padStart(2,"0")} · ${item.totalSeasons}S × ${item.episodesPerSeason}ep`
                          : `${fmtTime(item.watchedMinutes||0)} / ${fmtTime(item.duration)}`}
                      </span>
                      <span className="text-xs font-bold" style={{ color: pct > 0 ? "var(--accent)" : "var(--inactive)" }}>{pct}%</span>
                    </div>
                    <div className="w-full rounded-full h-1.5 overflow-hidden" style={{ background:"var(--input-bg)" }}>
                      <div className="h-full rounded-full transition-all duration-500 gradient-bg" style={{ width:`${pct}%` }} />
                    </div>
                  </div>
                )}

                {/* Actions rapides */}
                {!item.completed && (
                  <div className="flex gap-1.5 mt-2 flex-wrap">
                    {isSerie ? (
                      <button onClick={() => nextEp(item)}
                        className="text-xs px-3 py-1 rounded-lg font-medium"
                        style={{ background:"var(--input-bg)", color:"var(--accent)", border:"1px solid var(--border)" }}>
                        +1 ep →
                      </button>
                    ) : (
                      [15,30,60].map(m => (
                        <button key={m}
                          onClick={() => update(item.id, { watchedMinutes: Math.min(item.duration||9999, (item.watchedMinutes||0)+m) })}
                          className="text-xs px-3 py-1 rounded-lg font-medium"
                          style={{ background:"var(--input-bg)", color:"var(--accent)", border:"1px solid var(--border)" }}>
                          +{fmtTime(m)}
                        </button>
                      ))
                    )}
                    <button onClick={() => setProgressItem(item)}
                      className="text-xs px-3 py-1 rounded-lg font-medium"
                      style={{ background:"var(--input-bg)", color:"var(--secondary)", border:"1px solid var(--border)" }}>
                      ✎ modif
                    </button>
                  </div>
                )}
                {item.desc && <p className="text-xs mt-2" style={{ color:"var(--secondary)" }}>{item.desc}</p>}
              </div>
            );
          })
        }
      </div>

      {ConfirmModal}
      {modal && <MediaModal onClose={() => setModal(false)} onSave={add} />}
      {editItem && (
        <MediaModal isEdit initialData={editItem}
          onClose={() => setEditItem(null)}
          onSave={f => update(editItem.id, { title:f.title, genre:f.genre||"", desc:f.desc||"" })} />
      )}
      {progressItem && (
        <ProgressModal item={progressItem}
          onClose={() => setProgressItem(null)}
          onSave={d => { update(progressItem.id, d); setProgressItem(null); }} />
      )}
    </div>
  );
}

function MediaModal({ onClose, onSave, initialData, isEdit }) {
  const [form, setForm] = useState(() => {
    const base = { type:"film", title:"", genre:"", desc:"", duration:"", totalSeasons:"", episodesPerSeason:"" };
    if (!initialData) return base;
    return { ...base, ...initialData,
      duration: String(initialData.duration || ""),
      totalSeasons: String(initialData.totalSeasons || ""),
      episodesPerSeason: String(initialData.episodesPerSeason || "") };
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const isSerie = form.type === "serie";
  const valid = form.title.trim() && (isEdit || (isSerie ? (form.totalSeasons && form.episodesPerSeason) : form.duration));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h3 className="font-bold text-lg" style={{ color:"var(--text)" }}>{isEdit ? "Modifier ✎" : "Nouveau média"}</h3>
          <button onClick={onClose} className="text-2xl leading-none" style={{ color:"var(--inactive)" }}>×</button>
        </div>

        {!isEdit && (
          <div className="flex gap-2 mb-4">
            {[["film","🎬 Film"],["serie","📺 Série"]].map(([v,l]) => (
              <button key={v} onClick={() => set("type",v)}
                className="flex-1 py-2.5 rounded-xl text-sm font-semibold"
                style={form.type===v
                  ? { background:"linear-gradient(135deg,var(--grad1),var(--grad2))", color:"white" }
                  : { background:"var(--input-bg)", color:"var(--secondary)", border:"1px solid var(--border)" }}>
                {l}
              </button>
            ))}
          </div>
        )}

        <div className="space-y-3">
          <div>
            <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Titre *</label>
            <input value={form.title} onChange={e => set("title",e.target.value)}
              placeholder={isSerie ? "Breaking Bad…" : "Inception…"}
              className="w-full rounded-xl px-3 py-2.5 text-sm border" />
          </div>
          <div>
            <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Genre</label>
            <input value={form.genre} onChange={e => set("genre",e.target.value)}
              placeholder="Action, Drame…" className="w-full rounded-xl px-3 py-2.5 text-sm border" />
          </div>

          {!isEdit && !isSerie && (
            <div>
              <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Durée totale (minutes) *</label>
              <input type="number" value={form.duration} onChange={e => set("duration",e.target.value)}
                placeholder="148" className="w-full rounded-xl px-3 py-2.5 text-sm border" />
            </div>
          )}

          {!isEdit && isSerie && (
            <div className="flex gap-3">
              <div className="flex-1">
                <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Saisons *</label>
                <input type="number" value={form.totalSeasons} onChange={e => set("totalSeasons",e.target.value)}
                  placeholder="5" className="w-full rounded-xl px-3 py-2.5 text-sm border" />
              </div>
              <div className="flex-1">
                <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Ep/saison *</label>
                <input type="number" value={form.episodesPerSeason} onChange={e => set("episodesPerSeason",e.target.value)}
                  placeholder="10" className="w-full rounded-xl px-3 py-2.5 text-sm border" />
              </div>
            </div>
          )}

          <div>
            <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Note</label>
            <textarea value={form.desc} onChange={e => set("desc",e.target.value)}
              placeholder="Recommandé par…" rows={2}
              className="w-full rounded-xl px-3 py-2.5 text-sm border resize-none" />
          </div>
        </div>

        <button onClick={() => { if (valid) { onSave(form); onClose(); } }}
          className="w-full mt-5 py-3 rounded-xl font-semibold text-sm"
          style={valid
            ? { background:"linear-gradient(135deg,var(--grad1),var(--grad2))", color:"white" }
            : { background:"var(--input-bg)", color:"var(--inactive)" }}>
          {isEdit ? "Enregistrer" : "Ajouter"}
        </button>
      </div>
    </div>
  );
}

function ProgressModal({ item, onClose, onSave }) {
  const isSerie = item.type === "serie";
  const [season,  setSeason]  = useState(item.currentSeason || 1);
  const [episode, setEpisode] = useState(item.currentEpisode || 0);
  const [mins,    setMins]    = useState(item.watchedMinutes || 0);
  const fmtTime = m => m < 60 ? `${m}min` : `${Math.floor(m/60)}h${m%60>0?String(m%60).padStart(2,"0"):""}`;
  const pct = isSerie
    ? Math.min(100, Math.round(((season-1)*(item.episodesPerSeason||1)+episode) / ((item.totalSeasons||1)*(item.episodesPerSeason||1)) * 100))
    : Math.min(100, Math.round(mins / (item.duration||1) * 100));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-lg" style={{ color:"var(--text)" }}>Progression</h3>
          <button onClick={onClose} className="text-2xl leading-none" style={{ color:"var(--inactive)" }}>×</button>
        </div>
        <p className="text-sm font-semibold mb-4" style={{ color:"var(--accent)" }}>{item.title}</p>

        <div className="mb-5">
          <div className="flex justify-between mb-1.5">
            <span className="text-xs" style={{ color:"var(--secondary)" }}>
              {isSerie ? `S${String(season).padStart(2,"0")}E${String(episode).padStart(2,"0")}` : fmtTime(mins)}
            </span>
            <span className="text-xs font-bold" style={{ color:"var(--accent)" }}>{pct}%</span>
          </div>
          <div className="w-full rounded-full h-2 overflow-hidden" style={{ background:"var(--input-bg)" }}>
            <div className="h-full rounded-full transition-all duration-300 gradient-bg" style={{ width:`${pct}%` }} />
          </div>
        </div>

        {isSerie ? (
          <div className="flex gap-3">
            <div className="flex-1">
              <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Saison</label>
              <input type="number" min="1" max={item.totalSeasons} value={season}
                onChange={e => setSeason(Number(e.target.value))}
                className="w-full rounded-xl px-3 py-2.5 text-sm border" />
            </div>
            <div className="flex-1">
              <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Épisode</label>
              <input type="number" min="0" max={item.episodesPerSeason} value={episode}
                onChange={e => setEpisode(Number(e.target.value))}
                className="w-full rounded-xl px-3 py-2.5 text-sm border" />
            </div>
          </div>
        ) : (
          <div>
            <label className="block text-xs font-semibold mb-1.5" style={{ color:"var(--secondary)" }}>Minutes vues</label>
            <input type="number" min="0" max={item.duration} value={mins}
              onChange={e => setMins(Number(e.target.value))}
              className="w-full rounded-xl px-3 py-2.5 text-sm border" />
          </div>
        )}

        <button onClick={() => onSave(isSerie ? { currentSeason:season, currentEpisode:episode } : { watchedMinutes:mins })}
          className="w-full mt-5 py-3 rounded-xl font-semibold text-sm gradient-bg text-white">
          Enregistrer
        </button>
      </div>
    </div>
  );
}

// ---- Musique ----
function MusiqueTab({ spaceId, user, members }) {
  const [modal, setModal]       = useState(false);
  const [editItem, setEditItem] = useState(null);
  const path     = spaceId ? `spaces/${spaceId}/musique` : null;
  const musiques = useCollection(path);

  const add = async (form) => {
    try { await db.collection(path).add({ title: form.title, artist: form.artist || "", mood: form.mood || "", by: user.uid, liked: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); }
    catch(e) { console.error('Erreur ajout:', e); alert('Erreur lors de l\'ajout. Réessaie.'); }
  };
  const edit = async (id, form) => {
    try { await db.collection(path).doc(id).update({ title: form.title, artist: form.artist || "", mood: form.mood || "" }); }
    catch(e) { console.error('Erreur modif:', e); alert('Erreur lors de la modification. Réessaie.'); }
  };
  const toggleLike = async (id, liked) => {
    try { await db.collection(path).doc(id).update({ liked: !liked }); }
    catch(e) { console.error('Erreur toggle:', e); }
  };
  const del = async (id) => {
    if (!window.confirm('Supprimer cet élément ?')) return;
    try { await db.collection(path).doc(id).delete(); }
    catch(e) { console.error('Erreur suppression:', e); alert('Erreur lors de la suppression. Réessaie.'); }
  };

  return (
    <div className="pb-24">
      <div className="gradient-bg p-6">
        <h2 className="text-white font-bold text-xl mb-1">Musique 🎵</h2>
        <p className="text-sm" style={{ color: "rgba(255,255,255,0.75)" }}>

// ---- Dépenses ----
function DepensesTab({ spaceId, user, members }) {
  const [modal, setModal]         = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const path = spaceId ? `spaces/${spaceId}/depenses` : null;
  const depenses = useCollection(path);

  // Paramètres financiers (localStorage par utilisateur)
  const [salaire, setSalaire]       = useState(() => parseFloat(localStorage.getItem(`planio_salaire_${user.uid}`)) || 0);
  const [roundUpStep, setRoundUpStep] = useState(() => parseInt(localStorage.getItem(`planio_roundup_${user.uid}`)) || 5);

  const saveSettings = (s, r) => {
    localStorage.setItem(`planio_salaire_${user.uid}`, s);
    localStorage.setItem(`planio_roundup_${user.uid}`, r);
    setSalaire(parseFloat(s) || 0);
    setRoundUpStep(parseInt(r) || 5);
  };

  const add = async (form) => {
    try {
      const montant = parseFloat(form.montant) || 0;
      const rounded = form.categorie === 'perso' && roundUpStep > 0
        ? Math.ceil(montant / roundUpStep) * roundUpStep
        : montant;
      const roundUp = rounded - montant;
      await db.collection(path).add({
        titre: form.titre,
        montant,
        montantArrondi: rounded,
        roundUp,
        categorie: form.categorie || 'perso',
        payeur: form.payeur || user.uid,
        participants: form.participants || members.map(m => m.uid),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(e) { console.error(e); alert('Erreur lors de l\'ajout.'); }
  };

  const del = async (id) => {
    if (!window.confirm('Supprimer cette dépense ?')) return;
    try { await db.collection(path).doc(id).delete(); }
    catch(e) { console.error(e); }
  };

  // Mois courant
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const depensesMois = depenses.filter(d => {
    const date = d.createdAt?.toDate?.() || new Date();
    const m = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    return m === currentMonth;
  });

  // Totaux
  const totalCagnotte   = depenses.reduce((s, d) => s + (d.roundUp || 0), 0);
  const totalPersoMois  = depensesMois.filter(d => d.categorie !== 'pro').reduce((s, d) => s + (d.montant || 0), 0);
  const totalProMois    = depensesMois.filter(d => d.categorie === 'pro').reduce((s, d) => s + (d.montant || 0), 0);
  const epergneMois     = depensesMois.reduce((s, d) => s + (d.roundUp || 0), 0);
  const totalToutesMois = totalPersoMois + totalProMois;
  const restant         = salaire - totalToutesMois;
  const budgetPct       = salaire > 0 ? Math.min(100, (totalToutesMois / salaire) * 100) : 0;

  // Calcul des soldes membres
  const balances = {};
  members.forEach(m => { balances[m.uid] = 0; });
  depenses.forEach(dep => {
    const parts = dep.participants || members.map(m => m.uid);
    const share = dep.montant / parts.length;
    if (balances[dep.payeur] !== undefined) balances[dep.payeur] += dep.montant;
    parts.forEach(uid => { if (balances[uid] !== undefined) balances[uid] -= share; });
  });

  const getMemberName = (uid) => {
    const m = members.find(m => m.uid === uid);
    return m?.name || m?.displayName || m?.email?.split('@')[0] || '?';
  };

  return (
    <div className="px-4 pt-4 pb-32">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-bold">Dépenses 💸</h2>
        <div className="flex gap-2">
          <button onClick={() => setShowSettings(true)} className="w-9 h-9 rounded-xl flex items-center justify-center text-base" style={{ background: "var(--input-bg)" }}>⚙️</button>
          <button onClick={() => setModal(true)} className="gradient-bg text-white text-sm font-semibold px-3 py-2 rounded-xl flex items-center gap-1">
            <span className="text-base">+</span> Ajouter
          </button>
        </div>
      </div>

      {/* Cagnotte épargne */}
      <div className="card p-4 mb-3" style={{ background: "linear-gradient(135deg,rgba(249,168,212,0.12),rgba(192,132,252,0.12))", border: "1px solid rgba(192,132,252,0.25)" }}>
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs font-semibold mb-1" style={{ color: "var(--secondary)" }}>💰 CAGNOTTE ÉPARGNE</div>
            <div className="text-2xl font-bold" style={{ color: "#c084fc" }}>{totalCagnotte.toFixed(2)} €</div>
            <div className="text-xs mt-1" style={{ color: "var(--secondary)" }}>accumulés par arrondi auto</div>
          </div>
          <div className="text-right">
            <div className="text-xs font-semibold mb-1" style={{ color: "var(--secondary)" }}>CE MOIS</div>
            <div className="text-lg font-bold" style={{ color: "#86efac" }}>+{epergneMois.toFixed(2)} €</div>
          </div>
        </div>
      </div>

      {/* Budget restant */}
      {salaire > 0 && (
        <div className="card p-4 mb-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold" style={{ color: "var(--secondary)" }}>BUDGET CE MOIS</div>
            <div className={`text-sm font-bold ${restant >= 0 ? "text-green-400" : "text-red-400"}`}>
              {restant >= 0 ? "+" : ""}{restant.toFixed(0)} € restants
            </div>
          </div>
          <div className="w-full rounded-full h-2" style={{ background: "var(--input-bg)" }}>
            <div className="h-2 rounded-full transition-all" style={{ width: `${budgetPct}%`, background: budgetPct > 85 ? "#f87171" : budgetPct > 65 ? "#fbbf24" : "var(--accent)" }}></div>
          </div>
          <div className="flex justify-between mt-1">
            <span className="text-xs" style={{ color: "var(--secondary)" }}>{totalToutesMois.toFixed(0)} € dépensés (perso + pro)</span>
            <span className="text-xs" style={{ color: "var(--secondary)" }}>{salaire.toFixed(0)} € salaire</span>
          </div>
        </div>
      )}

      {/* Bilan mensuel */}
      <div className="card p-4 mb-4">
        <div className="text-xs font-semibold mb-3" style={{ color: "var(--secondary)" }}>BILAN DU MOIS</div>
        <div className="grid grid-cols-3 gap-2">
          <div className="text-center p-2 rounded-xl" style={{ background: "var(--input-bg)" }}>
            <div className="text-xs mb-1" style={{ color: "var(--secondary)" }}>Perso</div>
            <div className="font-bold text-sm">{totalPersoMois.toFixed(0)} €</div>
          </div>
          <div className="text-center p-2 rounded-xl" style={{ background: "var(--input-bg)" }}>
            <div className="text-xs mb-1" style={{ color: "var(--secondary)" }}>Pro</div>
            <div className="font-bold text-sm" style={{ color: "#93c5fd" }}>{totalProMois.toFixed(0)} €</div>
          </div>
          <div className="text-center p-2 rounded-xl" style={{ background: "var(--input-bg)" }}>
            <div className="text-xs mb-1" style={{ color: "var(--secondary)" }}>Épargné</div>
            <div className="font-bold text-sm" style={{ color: "#c084fc" }}>{epergneMois.toFixed(0)} €</div>
          </div>
        </div>
      </div>

      {/* Soldes membres */}
      {members.length > 1 && (
        <div className="card p-4 mb-4">
          <div className="text-xs font-semibold mb-3" style={{ color: "var(--secondary)" }}>SOLDES</div>
          <div className="flex flex-col gap-2">
            {members.map(m => {
              const bal = balances[m.uid] || 0;
              return (
                <div key={m.uid} className="flex items-center justify-between">
                  <span className="text-sm font-medium">{getMemberName(m.uid)}</span>
                  <span className={`text-sm font-bold ${bal >= 0 ? "text-green-400" : "text-red-400"}`}>
                    {bal >= 0 ? "+" : ""}{bal.toFixed(2)} €
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Liste dépenses */}
      {depenses.length === 0
        ? <EmptyState emoji="💸" text="aucune dépense" />
        : depenses.map(dep => {
          const isPro = dep.categorie === 'pro';
          return (
            <div key={dep.id} className="card p-4 mb-3">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1 flex-wrap">
                    <span className="font-semibold">{dep.titre}</span>
                    {isPro

function calcNutriObjectifs(poids, activite, objectif) {
  const p = parseFloat(poids) || 75;
  const mult = { sedentaire: 1.2, modere: 1.55, actif: 1.725, "tres-actif": 1.9 }[activite] || 1.55;
  const tdee = Math.round(p * 24 * mult);
  const adjust = { masse: 350, perte: -400, maintien: 0 }[objectif] || 0;
  const cal = tdee + adjust;
  const splits = {
    masse:    { p: 0.30, g: 0.40, l: 0.30 },
    perte:    { p: 0.35, g: 0.40, l: 0.25 },
    maintien: { p: 0.25, g: 0.45, l: 0.30 },
  }[objectif] || { p: 0.25, g: 0.45, l: 0.30 };
  return {
    cal,
    prot: Math.round(cal * splits.p / 4),
    gluc: Math.round(cal * splits.g / 4),
    lipi: Math.round(cal * splits.l / 9),
  };
}

                    <div className="text-xs" style={{ color: "var(--secondary)", fontSize: "9px" }}>{p.poids}</div>
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* Vue semaine calories */}
      <div className="card p-4 mb-4">
        <div className="text-xs font-semibold mb-3" style={{ color: "var(--secondary)" }}>SEMAINE — CALORIES</div>
        <div className="flex items-end gap-1 h-16">
          {calParJour.map((j, i) => {
            const h = Math.max(4, Math.round((j.cal / maxCal) * 56));
            const isToday = j.d === today;
            const isActive = j.d === activeDay;
            const color = j.cal >= objectifs.cal ? "#86efac" : j.cal > objectifs.cal * 0.8 ? "#fbbf24" : j.cal > 0 ? "#93c5fd" : "var(--border)";
            return (
              <div key={i} className="flex-1 flex flex-col items-center gap-1 cursor-pointer" onClick={() => setActiveDay(j.d)}>
                <div className="w-full rounded-sm transition-all" style={{ height: h + 'px', background: isActive ? "#c084fc" : color, outline: isToday ? "2px solid #c084fc" : "none", outlineOffset: "1px" }}></div>
                <div className="text-center" style={{ color: isActive ? "#c084fc" : "var(--secondary)", fontSize: "9px", fontWeight: isToday ? "700" : "400" }}>{jourLabels[i]}</div>
                {j.cal > 0 && <div style={{ color: "var(--secondary)", fontSize: "8px" }}>{j.cal}</div>}
              </div>
            );
          })}
        </div>
        <div className="flex justify-between mt-2">
          <span className="text-xs" style={{ color: "var(--secondary)" }}>Tap sur un jour pour voir ses repas</span>
          <span className="text-xs" style={{ color: "var(--secondary)" }}>Cible: {objectifs.cal} kcal</span>
        </div>
        {activeDay !== today && (
          <div className="mt-2 text-xs text-center py-1 rounded-lg" style={{ background: "rgba(192,132,252,0.15)", color: "#c084fc" }}>
            📅 Vue du {activeDay} · <span className="underline cursor-pointer" onClick={() => setActiveDay(today)}>Retour à aujourd'hui</span>
          </div>
        )}
      </div>

      {showSettings && (
        <FocusRepasSettings objectif={objectif} poids={poids} activite={activite} objectifs={objectifs}
          onClose={() => setShowSettings(false)} onSave={saveSettings} />
      )}
      {addMoment && (
        <FocusRepasAddModal moment={addMoment} onClose={() => setAddMoment(null)}
          onSave={(form) => { addRepas({ ...form, moment: addMoment }); setAddMoment(null); }} />
      )}
      {showPoids && (
        <FocusPoidsModal current={dernierPoids?.poids} onClose={() => setShowPoids(false)}
          onSave={(p) => { addPoids(p); setShowPoids(false); }} />
      )}
      </>}

      {/* Vue planning semaine */}
      {view === "planning" && (
        <div className="overflow-x-auto -mx-4 px-4">
          <div style={{ minWidth: "320px" }}>
            <div className="grid mb-2" style={{ gridTemplateColumns: "72px repeat(3, 1fr)", gap: "5px" }}>
              <div />
              {["Matin","Midi","Soir"].map(m => (
                <div key={m} className="text-center text-xs font-semibold" style={{ color: "var(--secondary)" }}>{m}</div>
              ))}
            </div>
            {["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"].map(jour => (
              <div key={jour} className="grid mb-2" style={{ gridTemplateColumns: "72px repeat(3, 1fr)", gap: "5px" }}>
                <div className="flex items-center text-xs font-medium" style={{ color: "var(--secondary)" }}>{jour}</div>
                {["Matin","Midi","Soir"].map(moment => {
                  const r = getRepas(jour, moment);
                  return (
                    <div key={moment}
                      onClick={() => r ? setEditPlan(r) : setAddSlot({ jour, moment })}
                      className="rounded-xl p-2 min-h-12 flex flex-col items-center justify-center cursor-pointer transition-all"
                      style={{ background: r ? "var(--card)" : "var(--input-bg)", border: r ? "1px solid var(--border)" : "1px dashed var(--border)" }}>
                      {r
                        ? <span className="text-xs font-semibold text-center leading-tight">{r.plat}</span>
                        : <span className="text-lg" style={{ color: "var(--border)" }}>+</span>
                      }
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      {addSlot && (
        <RepasModal slot={addSlot} onClose={() => setAddSlot(null)}
          onSave={(form) => { addPlan({ ...addSlot, ...form }); setAddSlot(null); }} />
      )}
      {editPlan && (
        <RepasModal slot={editPlan} existing={editPlan} onClose={() => setEditPlan(null)}
          onSave={(form) => { editPlanItem(editPlan.id, form); setEditPlan(null); }}
          onDelete={() => { delPlan(editPlan.id); setEditPlan(null); }} />
      )}
    </div>
  );
}

const JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const MOMENTS = ["Matin","Midi","Soir"];

function RepasTab({ spaceId, user, members }) {
  const [addSlot, setAddSlot]   = useState(null); // { jour, moment }
  const [editItem, setEditItem] = useState(null);
  const path = spaceId ? `spaces/${spaceId}/repas` : null;
  const repas = useCollection(path);

  const add = async (form) => {
    try {
      await db.collection(path).add({
        jour: form.jour, moment: form.moment,
        plat: form.plat, notes: form.notes || "",
        by: user.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(e) { console.error(e); alert('Erreur lors de l\'ajout.'); }
  };

  const edit = async (id, form) => {
    try { await db.collection(path).doc(id).update({ plat: form.plat, notes: form.notes || "" }); }
    catch(e) { console.error(e); }
  };

  const del = async (id) => {
    try { await db.collection(path).doc(id).delete(); }
    catch(e) { console.error(e); }
  };

  const getRepas = (jour, moment) => repas.find(r => r.jour === jour && r.moment === moment);

  return (
    <div className="px-4 pt-4 pb-32">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-bold">Repas 🍽️</h2>
      </div>

      <div className="overflow-x-auto -mx-4 px-4">
        <div style={{ minWidth: "340px" }}>
          {/* En-tête moments */}
          <div className="grid mb-2" style={{ gridTemplateColumns: "80px repeat(3, 1fr)", gap: "6px" }}>
            <div />
            {MOMENTS.map(m => (
              <div key={m} className="text-center text-xs font-semibold" style={{ color: "var(--secondary)" }}>{m}</div>
            ))}
          </div>

          {/* Lignes jours */}
          {JOURS.map(jour => (
            <div key={jour} className="grid mb-2" style={{ gridTemplateColumns: "80px repeat(3, 1fr)", gap: "6px" }}>
              <div className="flex items-center text-sm font-medium" style={{ color: "var(--secondary)" }}>{jour}</div>
              {MOMENTS.map(moment => {
                const r = getRepas(jour, moment);
                return (
                  <div key={moment}
                    onClick={() => r ? setEditItem(r) : setAddSlot({ jour, moment })}
                    className="rounded-xl p-2 min-h-12 flex flex-col items-center justify-center cursor-pointer transition-all"
                    style={{ background: r ? "var(--card)" : "var(--input-bg)", border: r ? "1px solid var(--border)" : "1px dashed var(--border)" }}>
                    {r ? (
                      <>
                        <span className="text-xs font-semibold text-center leading-tight">{r.plat}</span>
                        <UserBadge uid={r.by} members={members} />
                      </>
                    ) : (
                      <span className="text-lg" style={{ color: "var(--border)" }}>+</span>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {addSlot && (
        <RepasModal slot={addSlot} onClose={() => setAddSlot(null)} onSave={(form) => { add({ ...addSlot, ...form }); setAddSlot(null); }} />
      )}
      {editItem && (
        <RepasModal slot={editItem} existing={editItem} onClose={() => setEditItem(null)}
          onSave={(form) => { edit(editItem.id, form); setEditItem(null); }}
          onDelete={() => { del(editItem.id); setEditItem(null); }} />
      )}
    </div>
  );
}

function RepasModal({ slot, existing, onClose, onSave, onDelete }) {
  const [plat, setPlat]   = useState(existing?.plat || "");
  const [notes, setNotes] = useState(existing?.notes || "");

// ---- Tâches ----
function TachesTab({ spaceId, user, members }) {
  const [modal, setModal]       = useState(false);
  const [filter, setFilter]     = useState("all");
  const [editItem, setEditItem] = useState(null);
  const path  = spaceId ? `spaces/${spaceId}/taches` : null;
  const items = useCollection(path);

  const add = async (form) => {
    try { await db.collection(path).add({ title: form.title, desc: form.desc || "", priority: form.priority || "normal", by: user.uid, done: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); }
    catch(e) { console.error('Erreur ajout:', e); alert('Erreur lors de l\'ajout. Réessaie.'); }
  };
  const edit = async (id, form) => {
    try { await db.collection(path).doc(id).update({ title: form.title, desc: form.desc || "", priority: form.priority || "normal" }); }
    catch(e) { console.error('Erreur modif:', e); alert('Erreur lors de la modification. Réessaie.'); }
  };
  const toggle = async (id, done) => {
    try { await db.collection(path).doc(id).update({ done: !done }); }
    catch(e) { console.error('Erreur toggle:', e); }
  };
  const del = async (id) => {
    if (!window.confirm('Supprimer cet élément ?')) return;
    try { await db.collection(path).doc(id).delete(); }
    catch(e) { console.error('Erreur suppression:', e); alert('Erreur lors de la suppression. Réessaie.'); }
  };

  const filtered = filter === "all" ? items : filter === "done" ? items.filter(i => i.done) : items.filter(i => !i.done);
  const priorityStyle = (p) => p === "urgent" ? { bg: "#3d1515", color: "#f87171" } : p === "bas" ? { bg: "#0b2e26", color: "#5eead4" } : { bg: "#2d1a0b", color: "#fcd34d" };

  return (
    <div className="pb-24">
      <div className="gradient-bg p-6">
        <h2 className="text-white font-bold text-xl mb-1">Tâches ✅</h2>
        <p className="text-sm" style={{ color: "rgba(255,255,255,0.75)" }}>
          {items.filter(i => !i.done).length} tâche{items.filter(i => !i.done).length !== 1 ? "s" : ""} en cours
        </p>
      </div>
      <div className="p-4">
        <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
          {[["all","Toutes"],["todo","À faire"],["done","Faites ✓"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)} className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap filter-btn ${filter === v ? "active" : ""}`}>{l}</button>
          ))}
        </div>
        <button onClick={() => setModal(true)} className="w-full gradient-bg text-white font-semibold py-3 rounded-xl mb-4 flex items-center justify-center gap-2">
          <span className="text-xl">+</span> Ajouter une tâche
        </button>
        {filtered.length === 0
          ? <EmptyState emoji="✅" text="Aucune tâche ici !" />
          : filtered.map(item => {
              const ps = priorityStyle(item.priority);
              return (
                <div key={item.id} className="card p-4 mb-3" style={item.done ? { opacity: 0.45 } : {}}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        <span className={`font-semibold ${item.done ? "line-through" : ""}`} style={{ color: item.done ? "var(--inactive)" : "var(--text)" }}>{item.title}</span>
                        <UserBadge uid={item.by} members={members} />
                        {item.priority && item.priority !== "normal" && (
                          <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: ps.bg, color: ps.color }}>{item.priority}</span>
                        )}
                      </div>
                      {item.desc && <p className="text-sm" style={{ color: "var(--secondary)" }}>{item.desc}</p>}
                    </div>
                    <div className="flex flex-col gap-1">
                      <button onClick={() => toggle(item.id, item.done)} className="w-8 h-8 rounded-full flex items-center justify-center text-sm"
                        style={item.done ? { background: "#1a3a2a", color: "#4ade80" } : { background: "var(--input-bg)", color: "var(--inactive)" }}>
                        {item.done ? "✓" : "○"}
                      </button>
                      <button onClick={() => setEditItem(item)} className="w-8 h-8 rounded-full flex items-center justify-center text-xs"
                        style={{ background: "var(--input-bg)", color: "var(--secondary)" }}>✎</button>
                      <button onClick={() => del(item.id)} className="w-8 h-8 rounded-full flex items-center justify-center text-xs"
                        style={{ background: "#2d1520", color: "#f87171" }}>✕</button>
                    </div>
                  </div>
                </div>
              );
            })
        }
      </div>
      {modal && (
        <AddModal title="Nouvelle tâche ✅"
          fields={[
            { key: "title",    label: "Titre",    required: true, placeholder: "Que faut-il faire ?" },
            { key: "desc",     label: "Détails",  type: "textarea" },
            { key: "priority", label: "Priorité", placeholder: "urgent / normal / bas" },
          ]}
          onClose={() => setModal(false)} onSave={add}
